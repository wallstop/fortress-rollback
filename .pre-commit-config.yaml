# Pre-commit hooks for Fortress Rollback
# Install: pip install pre-commit && pre-commit install --hook-type pre-commit --hook-type pre-push
# Run staged/current checks manually: pre-commit run
#
# See https://pre-commit.com for more information
#
# Cross-platform notes:
# - Fast pre-commit hooks work on Linux, macOS, and Windows
# - Most hooks use local Python scripts for maximum Windows compatibility
# - Manual/CI hooks may require bash (available via Git Bash or WSL)

default_language_version:
  python: python3

default_stages: [pre-commit]

repos:
  # All hooks are local Python scripts for maximum Windows compatibility
  - repo: local
    hooks:
      # ══════════════════════════════════════════════════════════════════════
      # File hygiene checks
      # ══════════════════════════════════════════════════════════════════════
      - id: trailing-whitespace
        name: trim trailing whitespace
        entry: python scripts/hooks/trailing-whitespace.py
        language: python
        types: [text]

      - id: end-of-file-fixer
        name: fix end of files
        entry: python scripts/hooks/end-of-file-fixer.py
        language: python
        types: [text]

      - id: check-yaml
        name: check yaml
        entry: python scripts/hooks/check-yaml.py
        language: python
        types: [yaml]

      - id: check-toml
        name: check toml
        entry: python scripts/hooks/check-toml.py
        language: python
        types: [toml]

      - id: check-json
        name: check json
        entry: python scripts/hooks/check-json.py
        language: python
        types: [json]

      - id: check-merge-conflict
        name: check for merge conflicts
        entry: python scripts/hooks/check-merge-conflict.py
        language: python
        types: [text]

      - id: check-no-tla-tools-cache
        name: reject commits under .tla-tools/ (runtime cache)
        entry: python scripts/hooks/check-no-tla-tools-cache.py
        language: python
        pass_filenames: true
        always_run: true

      - id: mixed-line-ending
        name: fix line endings (LF)
        entry: python scripts/hooks/mixed-line-ending.py
        language: python
        types: [text]

      # ══════════════════════════════════════════════════════════════════════
      # Python test quality
      # ══════════════════════════════════════════════════════════════════════
      - id: check-empty-tests
        name: check for empty test methods
        entry: python scripts/hooks/check-empty-tests.py
        language: python
        types: [python]
        files: 'test_.*\.py$|.*_test\.py$'

      - id: check-tomllib-fallback
        name: require tomli fallback for tomllib imports
        entry: python scripts/hooks/check-tomllib-fallback.py
        language: python
        types: [python]

      # ══════════════════════════════════════════════════════════════════════
      # Rust checks
      # ══════════════════════════════════════════════════════════════════════
      - id: cargo-fmt
        name: cargo fmt
        entry: python scripts/build/run-cargo-fmt.py
        language: python
        types: [rust]
        pass_filenames: false

      - id: check-track-caller-async
        name: check track_caller on async fn
        entry: python scripts/hooks/check-track-caller-async.py
        language: python
        types: [rust]

      - id: check-advance-frame-error-handling
        name: check advance_frame error handling
        entry: python scripts/hooks/check-advance-frame-error-handling.py
        language: python
        types: [rust]

      - id: unbounded-alloc
        name: check // alloc-bound and // reserve-in-loop justifications
        entry: python scripts/hooks/check-unbounded-alloc.py
        language: python
        types: [rust]
        files: '^src/.*\.rs$'

      - id: cargo-clippy
        name: cargo clippy
        entry: python scripts/build/run-cargo-clippy.py
        language: python
        types: [rust]
        pass_filenames: false
        stages: [manual]

      - id: rustdoc-links
        name: rustdoc link check
        entry: python scripts/docs/check-rustdoc-links.py
        language: python
        pass_filenames: false
        files: '\.rs$'
        stages: [manual]

      - id: check-doc-claims
        name: check doc comment accuracy
        entry: bash scripts/ci/check-doc-claims.sh
        language: system
        pass_filenames: false
        files: '\.rs$'
        stages: [manual]

      - id: check-derive-bounds
        name: check derive bounds
        entry: bash scripts/ci/check-derive-bounds.sh
        language: system
        pass_filenames: false
        files: '\.rs$'
        stages: [manual]

      # ══════════════════════════════════════════════════════════════════════
      # Documentation checks
      # ══════════════════════════════════════════════════════════════════════
      - id: markdownlint
        name: markdownlint (autofix)
        entry: python scripts/hooks/markdownlint.py
        language: python
        types: [markdown]
        exclude: '^(target/|fuzz/target/|loom-tests/target/|progress/|PLAN\.md)'

      - id: vale
        name: vale prose linting (advisory)
        entry: python scripts/hooks/vale.py
        language: python
        types: [markdown]
        files: ^docs/
        verbose: true

      - id: check-links
        name: check links
        entry: python scripts/docs/check-links.py
        language: python
        pass_filenames: false
        files: '\.(md|rs)$'
        stages: [manual]

      - id: check-code-fence-syntax
        name: check code fence syntax
        entry: bash scripts/docs/check-code-fence-syntax.sh docs
        language: system
        pass_filenames: false
        files: '\.md$'
        stages: [manual]

      - id: sync-wiki
        name: sync wiki mirrors
        entry: python scripts/docs/sync-wiki.py
        language: python
        pass_filenames: false
        files: '^(docs/.*\.md|wiki/.*\.md|scripts/docs/sync-wiki\.py)$'
        stages: [manual]

      - id: wiki-consistency
        name: wiki consistency check
        entry: python scripts/docs/check-wiki-consistency.py
        language: python
        pass_filenames: false
        files: '^(docs/.*\.md|wiki/.*\.md|scripts/docs/sync-wiki\.py)$'
        stages: [manual]

      - id: check-theme-colors
        name: check docs theme colors
        entry: python scripts/docs/check-theme-colors.py
        language: python
        pass_filenames: false
        files: '^docs/stylesheets/custom\.css$'

      - id: check-sync-headers
        name: check sync headers
        entry: python scripts/hooks/check-sync-headers.py
        language: python
        files: '^(docs/.*\.md|wiki/.*\.md)$'
        pass_filenames: false

      - id: sync-version-check
        name: sync version references (check)
        entry: bash scripts/sync-version.sh --check
        language: system
        pass_filenames: false
        files: '(\.rs|\.md|\.toml|\.yml|\.yaml|\.sh|\.txt|\.json)$'
        stages: [manual]

      - id: changelog-unreleased-rule
        name: changelog unreleased code rule
        entry: python scripts/hooks/check-changelog-unreleased.py
        language: python
        pass_filenames: false
        files: '^CHANGELOG\.md$'

      - id: wire-golden-immutable
        name: released wire golden immutability
        entry: python scripts/hooks/check-wire-golden-immutable.py --cached
        language: python
        pass_filenames: false
        always_run: true

      - id: workspace-lock-structure
        name: check Cargo workspace lock ownership
        entry: python scripts/release/workspace_locks.py check-structure
        language: python
        pass_filenames: false
        files: '(^|/)Cargo\.(toml|lock)$|^scripts/release/'

      - id: validate-agent-skills
        name: validate Agent Skills open format
        entry: python scripts/hooks/validate-agent-skills.py
        language: python
        additional_dependencies: [pyyaml==6.0.3]
        pass_filenames: false
        files: '^\.agents/skills/.*$'

      - id: check-agent-skills
        name: check Agent Skills code examples
        entry: bash scripts/docs/check-agent-skills.sh
        language: system
        pass_filenames: false
        files: '^\.agents/skills/.*\.md$'
        stages: [manual]

      # ══════════════════════════════════════════════════════════════════════
      # Container & infrastructure checks
      # ══════════════════════════════════════════════════════════════════════
      - id: check-dockerfile
        name: check Dockerfile best practices
        entry: python scripts/hooks/check-dockerfile.py
        language: python
        files: '(Dockerfile|devcontainer\.json)$'
        pass_filenames: true

      - id: check-network-timing-invariants
        name: check network timing invariants
        entry: python scripts/hooks/check-network-timing-invariants.py
        language: python
        pass_filenames: false
        files: '^(\.config/nextest\.toml|tests/network/multi_process\.rs|src/network/protocol/mod\.rs|\.github/workflows/ci-network-nightly\.yml|scripts/hooks/check-network-timing-invariants\.py)$'

      # ══════════════════════════════════════════════════════════════════════
      # Hook quality
      # ══════════════════════════════════════════════════════════════════════
      - id: check-hook-output-format
        name: check hook output format
        entry: python scripts/hooks/check-hook-output-format.py
        language: python
        files: '^scripts/(hooks/|build/|docs/|verification/|ci/)?[a-z][^/]*\.py$'
        pass_filenames: true
        stages: [manual]

      - id: check-shell-portability
        name: check shell portability
        entry: bash scripts/ci/check-shell-portability.sh
        language: system
        files: '\.sh$'
        pass_filenames: false
        stages: [manual]

      # ══════════════════════════════════════════════════════════════════════
      # CI validation (skip gracefully if tools not installed)
      # ══════════════════════════════════════════════════════════════════════
      - id: actionlint
        name: actionlint (GitHub Actions)
        entry: python scripts/hooks/actionlint.py
        language: python
        files: '^\.github/workflows/.*\.ya?ml$'
        pass_filenames: true

      - id: kani-coverage
        name: kani proof coverage
        entry: python scripts/verification/check-kani-coverage.py
        language: python
        pass_filenames: false
        files: '\.rs$|verify-kani\.sh$'

      - id: cargo-hack-check
        name: cargo hack feature check
        entry: python scripts/build/check-cargo-hack.py
        language: python
        pass_filenames: false
        files: '\.rs$|Cargo\.toml$'
        stages: [manual]

      - id: check-issue-template-versions
        name: check issue template versions (skips if offline)
        entry: python scripts/ci/sync-issue-template-versions.py --check
        language: python
        pass_filenames: false
        files: '^(\.github/ISSUE_TEMPLATE/bug_report\.yml|scripts/ci/sync-issue-template-versions\.py)$'
        stages: [pre-push]
