name: CI - Version Sync

on:
  push:
    branches: [main]
    paths:
      - "**.rs"
      - "**.md"
      - "**.toml"
      - "**.yml"
      - "**.yaml"
      - "**.sh"
      - "**.txt"
      - "**.json"
      - "scripts/sync-version.sh"
      - ".github/workflows/ci-version-sync.yml"
  pull_request:
    branches: [main]
    paths:
      - "**.rs"
      - "**.md"
      - "**.toml"
      - "**.yml"
      - "**.yaml"
      - "**.sh"
      - "**.txt"
      - "**.json"
      - "scripts/sync-version.sh"
      - ".github/workflows/ci-version-sync.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  version-sync:
    name: Version Sync Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check Cargo/changelog/version references
        run: bash scripts/sync-version.sh --check

      - name: Check released wire golden immutability
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: python3 scripts/hooks/check-wire-golden-immutable.py --base-ref "$BASE_SHA"
