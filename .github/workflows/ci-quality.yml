name: CI - Code Quality

# Additional static analysis tools for enhanced code quality
# Includes:
# - typos: Fast spell checker for source code
# - cargo-spellcheck: Spelling and grammar in documentation
# - cargo-shear: Fast unused dependency detection
#
# Note: typos is blocking. cargo-shear and cargo-spellcheck are advisory
# diagnostics that report issues in the summary without blocking PRs.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '**.md'
      - '.typos.toml'
      - '.config/spellcheck.toml'
      - '.github/actions/install-cargo-tool/**'
      - '.github/workflows/ci-quality.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '**.md'
      - '.typos.toml'
      - '.config/spellcheck.toml'
      - '.github/actions/install-cargo-tool/**'
      - '.github/workflows/ci-quality.yml'
  schedule:
    # Run weekly on Sundays at 4 AM UTC (after safety checks at 3 AM)
    - cron: '0 4 * * 0'
  workflow_dispatch:

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ============================================================================
  # TYPOS - FAST SOURCE CODE SPELL CHECKER
  # ============================================================================
  typos:
    name: Spell Check (typos)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check spelling with typos
        uses: crate-ci/typos@v1.47.0
        with:
          config: .typos.toml

  # ============================================================================
  # CARGO SHEAR - FAST UNUSED DEPENDENCY DETECTION
  # ============================================================================
  unused-deps-fast:
    name: Unused Dependencies (cargo-shear)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      issues-found: ${{ steps.shear.outputs.issues-found }}
      exit-code: ${{ steps.shear.outputs.exit-code }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-shear
        uses: ./.github/actions/install-cargo-tool
        with:
          tool: cargo-shear

      - name: Check for unused dependencies
        id: shear
        run: |
          set -o pipefail

          {
            echo "## Unused Dependencies Check (cargo-shear)"
            echo ""
            echo "Fast regex-based detection of unused dependencies."
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # cargo-shear is fast but may have false positives
          # Run and capture output, but keep this job advisory.
          shear_status=0
          cargo shear --locked --color never 2>&1 | tee shear-output.txt || shear_status=$?
          echo "exit-code=$shear_status" >> "$GITHUB_OUTPUT"

          if [ "$shear_status" -eq 0 ]; then
            echo "issues-found=false" >> "$GITHUB_OUTPUT"
            echo "✅ No unused dependencies detected" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "issues-found=true" >> "$GITHUB_OUTPUT"
            {
              echo "⚠️ Potentially unused dependencies detected:"
              echo ""
              echo "\`\`\`"
              cat shear-output.txt
              echo "\`\`\`"
              echo ""
              echo "Note: cargo-shear may have false positives. Verify with \`cargo +nightly udeps\` if needed."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload shear report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: shear-report
          path: shear-output.txt
          retention-days: 7

  # ============================================================================
  # CARGO SPELLCHECK - DOCUMENTATION SPELLING
  # ============================================================================
  spellcheck:
    name: Documentation Spelling
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      issues-found: ${{ steps.spellcheck.outputs.issues-found }}
      issue-count: ${{ steps.spellcheck.outputs.issue-count }}
      tool-failed: ${{ steps.spellcheck.outputs.tool-failed }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-spellcheck
        uses: ./.github/actions/install-cargo-tool
        with:
          tool: cargo-spellcheck
          version: 0.15.1

      - name: Check spelling in documentation
        id: spellcheck
        run: |
          {
            echo "## Documentation Spelling Check"
            echo ""
            echo "Checking spelling in doc comments and markdown files..."
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # Run spellcheck on Rust doc comments
          # Use -m 1 so findings are machine-detectable, then keep this job
          # advisory by handling the status explicitly. Limit to Hunspell so
          # the checked-in Hunspell quirks are the active spelling policy.
          set -o pipefail
          spellcheck_status=0
          cargo spellcheck check --checkers hunspell -m 1 2>&1 | tee spellcheck-output.txt || spellcheck_status=$?

          ISSUE_COUNT=$(grep -cE "^(error|warning):|error: spellcheck|warning:" spellcheck-output.txt || true)
          ISSUE_COUNT=${ISSUE_COUNT:-0}
          echo "issue-count=$ISSUE_COUNT" >> "$GITHUB_OUTPUT"

          if [ "$ISSUE_COUNT" -eq 0 ] && [ "$spellcheck_status" -eq 0 ]; then
            echo "issues-found=false" >> "$GITHUB_OUTPUT"
            echo "tool-failed=false" >> "$GITHUB_OUTPUT"
            echo "✅ No spelling issues found in documentation" >> "$GITHUB_STEP_SUMMARY"
          else
            if [ "$ISSUE_COUNT" -eq 0 ]; then
              echo "issues-found=false" >> "$GITHUB_OUTPUT"
              echo "tool-failed=true" >> "$GITHUB_OUTPUT"
            else
              echo "issues-found=true" >> "$GITHUB_OUTPUT"
              echo "tool-failed=false" >> "$GITHUB_OUTPUT"
            fi
            {
              if [ "$ISSUE_COUNT" -eq 0 ]; then
                echo "⚠️ cargo-spellcheck exited with status $spellcheck_status but emitted no parsed findings:"
              else
                echo "⚠️ Found potential spelling issues ($ISSUE_COUNT):"
              fi
              echo ""
              echo "<details>"
              echo "<summary>Click to expand</summary>"
              echo ""
              echo "\`\`\`"
              head -100 spellcheck-output.txt
              echo "\`\`\`"
              echo ""
              echo "</details>"
              echo ""
              echo "Run \`cargo spellcheck fix\` locally to auto-fix issues."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload spellcheck report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: spellcheck-report
          path: spellcheck-output.txt
          retention-days: 7

  # ============================================================================
  # SUMMARY
  # ============================================================================
  quality-summary:
    name: Quality Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [typos, unused-deps-fast, spellcheck]
    if: always()

    steps:
      - name: Generate summary
        run: |
          map_job_status() {
            case "$1" in
              success) echo "✅ Completed" ;;
              failure) echo "⚠️ Failed" ;;
              skipped) echo "⏭️ Skipped" ;;
              cancelled) echo "🚫 Cancelled" ;;
              *) echo "❓ Unknown" ;;
            esac
          }

          map_advisory_status() {
            if [ "${4:-false}" = "true" ]; then
              echo "⚠️ Tool Failed"
            elif [ "$1" = "true" ]; then
              if [ -n "${2:-}" ] && [ "$2" != "0" ]; then
                echo "⚠️ Issues Found ($2)"
              else
                echo "⚠️ Issues Found"
              fi
            else
              map_job_status "$3"
            fi
          }

          {
            echo "## Code Quality Summary"
            echo ""
            echo "Typos is blocking. cargo-shear and cargo-spellcheck are advisory diagnostics."
            echo ""
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| Spell Check (typos) | $(map_job_status '${{ needs.typos.result }}') |"
            echo "| Unused Dependencies (cargo-shear) | $(map_advisory_status '${{ needs.unused-deps-fast.outputs.issues-found }}' '' '${{ needs.unused-deps-fast.result }}') |"
            echo "| Documentation Spelling | $(map_advisory_status '${{ needs.spellcheck.outputs.issues-found }}' '${{ needs.spellcheck.outputs.issue-count }}' '${{ needs.spellcheck.result }}' '${{ needs.spellcheck.outputs.tool-failed }}') |"
            echo ""
            echo "### Recommendations"
            echo ""
            echo "- Review any warnings in the individual job logs"
            echo "- Run \`typos\` locally to check for spelling issues in source code"
            echo "- Run \`cargo shear\` locally to check for unused dependencies"
            echo "- Run \`cargo spellcheck fix\` to auto-fix spelling issues"
          } >> "$GITHUB_STEP_SUMMARY"
