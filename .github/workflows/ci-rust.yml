name: CI - Rust

on:
  push:
    branches: [main]
    paths:
      - '**.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'rust-toolchain.toml'
      - '.cargo/config.toml'
      - 'Cross.toml'
      - 'clippy.toml'
      - 'rustfmt.toml'
      - 'scripts/verification/verify-kani.sh'
      - 'scripts/verification/check-kani-coverage.sh'
      - 'scripts/ci/check-emscripten-dependencies.sh'
      - 'tests/godot-emscripten/**'
      - '.github/actions/install-pinned-nightly/**'
      - '.github/workflows/ci-rust.yml'
  pull_request:
    branches: [main]
    paths:
      - '**.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'rust-toolchain.toml'
      - '.cargo/config.toml'
      - 'Cross.toml'
      - 'clippy.toml'
      - 'rustfmt.toml'
      - 'scripts/verification/verify-kani.sh'
      - 'scripts/verification/check-kani-coverage.sh'
      - 'scripts/ci/check-emscripten-dependencies.sh'
      - 'tests/godot-emscripten/**'
      - '.github/actions/install-pinned-nightly/**'
      - '.github/workflows/ci-rust.yml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Quick validation that all Kani proofs are in tier lists
  kani-coverage:
    name: Kani Proof Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v7

      - name: Validate Kani proof coverage
        run: ./scripts/verification/check-kani-coverage.sh
        # Ensures all #[kani::proof] functions are in tier lists in verify-kani.sh

  # Primary build and test job (cross-platform matrix)
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install cargo-nextest
        uses: ./.github/actions/install-cargo-tool
        with:
          tool: cargo-nextest

      - name: Configure sccache
        id: sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        continue-on-error: true

      - name: Verify sccache is working (Unix)
        id: sccache-check-unix
        if: steps.sccache.outcome == 'success' && runner.os != 'Windows'
        run: ./scripts/ci/verify-sccache.sh
        continue-on-error: true

      - name: Verify sccache is working (Windows)
        id: sccache-check-windows
        if: steps.sccache.outcome == 'success' && runner.os == 'Windows'
        shell: bash
        run: ./scripts/ci/verify-sccache.sh
        continue-on-error: true

      - name: Set sccache working status
        id: sccache-check
        shell: bash
        run: |
          # Assign GitHub expressions to variables (avoids shellcheck SC2193)
          unix_working="${{ steps['sccache-check-unix'].outputs.working }}"
          windows_working="${{ steps['sccache-check-windows'].outputs.working }}"
          if [ "$unix_working" == "true" ] || [ "$windows_working" == "true" ]; then
            echo "working=true" >> "$GITHUB_OUTPUT"
          else
            echo "working=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Clear sccache env on failure
        if: steps.sccache.outcome != 'success' || steps.sccache-check.outputs.working != 'true'
        shell: bash
        run: |
          echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_ENABLED=" >> "$GITHUB_ENV"

      - name: Cache cargo registry and build
        uses: actions/cache@v6
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: build-${{ matrix.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            build-${{ matrix.os }}-cargo-

      - name: Build
        run: cargo build --verbose
        env:
          RUSTC_WRAPPER: ${{ steps.sccache-check.outputs.working == 'true' && 'sccache' || '' }}
          SCCACHE_GHA_ENABLED: ${{ steps.sccache-check.outputs.working == 'true' && 'true' || 'false' }}
          SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
          SCCACHE_STARTUP_NOTIFY_TIMEOUT: "60"
          SCCACHE_IDLE_TIMEOUT: "0"

      - name: Build network test peer
        run: cargo build -p network-test-peer
        env:
          RUSTC_WRAPPER: ${{ steps.sccache-check.outputs.working == 'true' && 'sccache' || '' }}
          SCCACHE_GHA_ENABLED: ${{ steps.sccache-check.outputs.working == 'true' && 'true' || 'false' }}
          SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
          SCCACHE_STARTUP_NOTIFY_TIMEOUT: "60"
          SCCACHE_IDLE_TIMEOUT: "0"

      - name: Run tests (nextest)
        run: cargo nextest run --profile ci --verbose
        env:
          RUSTC_WRAPPER: ${{ steps.sccache-check.outputs.working == 'true' && 'sccache' || '' }}
          SCCACHE_GHA_ENABLED: ${{ steps.sccache-check.outputs.working == 'true' && 'true' || 'false' }}
          SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
          SCCACHE_STARTUP_NOTIFY_TIMEOUT: "60"
          SCCACHE_IDLE_TIMEOUT: "0"

      - name: Build docs
        run: cargo doc --verbose

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --features tokio,json -- -D warnings

  hot-join:
    name: Hot Join Feature
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install cargo-nextest
        uses: ./.github/actions/install-cargo-tool
        with:
          tool: cargo-nextest

      - name: Setup Rust cache
        uses: ./.github/actions/setup-rust-cache
        with:
          cache-key: hot-join

      - name: Run hot-join tests
        run: cargo nextest run --profile ci --features hot-join --no-capture

      - name: Run hot-join clippy
        run: cargo clippy --workspace --all-targets --features hot-join,tokio,json -- -D warnings

  # Miri undefined behavior check (cross-platform, optimized)
  #
  # OPTIMIZATION STRATEGY (January 2026):
  # Property tests are excluded from Miri runs because:
  # 1. They're ~50-300x slower than unit tests under Miri (10+ min each)
  # 2. Miri detects UB, not algorithmic correctness (property tests' purpose)
  # 3. The same code paths are exercised by faster unit tests
  #
  # Concurrent tests (thread::spawn) are also skipped because:
  # 1. Multi-threaded tests are extremely slow under Miri (~3 min each)
  # 2. Loom provides better concurrency verification for these tests
  # 3. Only 3 tests affected: test_collecting_observer_concurrent_*
  #
  # Test distribution (from analysis, ~951 unit tests after excluding slow tests):
  # - sessions:: ~253 tests (27%)
  # - network:: ~225 tests (24%)
  # - sync_layer:: ~96 tests (10%)
  # - input_queue:: ~58 tests (6%)
  # - rle:: ~44 tests (5%)
  # - misc (error, telemetry, frame_info, tests, sync, test_config, hash, rng, checksum, time_sync): ~275 tests (29%)
  #
  # Note: The "misc" job runs 319 tests because it includes rle:: (275 + 44 = 319)
  # Windows/macOS "misc" runs 377 tests (includes input_queue:: too)
  #
  # Platform strategy:
  # - Linux: 4 jobs with 2 seeds for race detection, full coverage
  #   (input_queue + sync_layer split into separate job for balanced load)
  # - Windows: 2 jobs with 1 seed, platform-specific UB detection
  #   (input_queue grouped with misc for fewer total jobs)
  # - macOS: 2 jobs with 1 seed, platform-specific UB detection
  #
  # Big-endian wire-format coverage is intentionally handled by fast
  # host-native golden byte tests plus a source guard that rejects native-endian
  # wire APIs. Do not install cross-compilers inside Miri jobs: the uncached
  # s390x apt path is mirror-speed dependent and can consume the whole job
  # timeout before tests start.
  #
  # Performance notes:
  # - Property tests are 50-300x slower under Miri (skipped, use proptest directly)
  # - Concurrent tests are extremely slow under Miri (skipped, use loom instead)
  # - Total: 8 jobs; normally ~20-25 minutes, with a 30-minute cap for hosted-runner variance
  miri:
    name: Miri (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # ============================================================
          # Linux jobs (2 seeds each, 4 jobs total)
          # Skip: property_tests (slow), concurrent (use loom instead)
          # ============================================================

          # Linux Job 1: Sessions module (~253 tests)
          - name: Linux - sessions
            os: ubuntu-latest
            seeds: "0..2"
            test_filter: "sessions::"
            skip_filter: "--skip property_tests --skip concurrent"

          # Linux Job 2: Network module (~225 tests)
          - name: Linux - network
            os: ubuntu-latest
            seeds: "0..2"
            test_filter: "network::"
            skip_filter: "--skip property_tests --skip concurrent"

          # Linux Job 3: Input queue + sync_layer (~154 tests)
          - name: Linux - queues
            os: ubuntu-latest
            seeds: "0..2"
            test_filter: "input_queue:: sync_layer::"
            skip_filter: "--skip property_tests --skip concurrent"

          # Linux Job 4: Everything else (~319 tests)
          # Covers: error::, hash::, rng::, checksum::, time_sync::,
          #         telemetry::, frame_info::, sync::, rle::, tests::
          - name: Linux - misc
            os: ubuntu-latest
            seeds: "0..2"
            test_filter: ""
            skip_filter: "--skip property_tests --skip concurrent --skip sessions:: --skip network:: --skip input_queue:: --skip sync_layer::"

          # ============================================================
          # Windows jobs (1 seed each, 2 jobs total)
          # ============================================================

          # Windows Job 1: Core modules (~574 tests)
          - name: Windows - core
            os: windows-latest
            seeds: "0..1"
            test_filter: "sessions:: network:: sync_layer::"
            skip_filter: "--skip property_tests --skip concurrent"

          # Windows Job 2: Everything else (~377 tests)
          - name: Windows - misc
            os: windows-latest
            seeds: "0..1"
            test_filter: ""
            skip_filter: "--skip property_tests --skip concurrent --skip sessions:: --skip network:: --skip sync_layer::"

          # ============================================================
          # macOS jobs (1 seed each, 2 jobs total)
          # ============================================================

          # macOS Job 1: Core modules (~574 tests)
          - name: macOS - core
            os: macos-latest
            seeds: "0..1"
            test_filter: "sessions:: network:: sync_layer::"
            skip_filter: "--skip property_tests --skip concurrent"

          # macOS Job 2: Everything else (~377 tests)
          - name: macOS - misc
            os: macos-latest
            seeds: "0..1"
            test_filter: ""
            skip_filter: "--skip property_tests --skip concurrent --skip sessions:: --skip network:: --skip sync_layer::"

    steps:
      - uses: actions/checkout@v7

      - name: Install nightly with Miri
        id: nightly
        uses: ./.github/actions/install-pinned-nightly
        with:
          # Pin Miri toolchain to avoid breakages from nightly regressions.
          # Bump intentionally after validating Miri on all CI platforms.
          pin-file: miri-toolchain
          components: miri

      - name: Cache cargo registry (no target for Miri)
        uses: actions/cache@v6
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          # NOTE: do not cache `target/` for Miri.
          # `cargo miri` writes toolchain-specific wrapper artifacts under `target/miri/`.
          # Caching/restoring those across changing nightly toolchains can break builds with:
          #   "contains outdated or invalid JSON; try `cargo clean`".
          # IMPORTANT: use a versioned cache namespace so we never restore pre-fix caches
          # that may have included `target/`.
          key: miri-v2-${{ steps.nightly.outputs.toolchain }}-${{ matrix.os }}-${{ matrix.name }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            miri-v2-${{ steps.nightly.outputs.toolchain }}-${{ matrix.os }}-${{ matrix.name }}-cargo-
            miri-v2-${{ steps.nightly.outputs.toolchain }}-${{ matrix.os }}-cargo-

      - name: Miri toolchain diagnostics
        shell: bash
        run: |
          set -euo pipefail
          rustc -Vv
          cargo -Vv
          cargo miri --version

      - name: Clean stale Miri artifacts
        shell: bash
        run: |
          set -euo pipefail
          rm -rf target/miri

      - name: Setup Miri
        run: cargo miri setup

      - name: Run Miri tests
        shell: bash
        run: |
          set -euo pipefail

          test_filter="${{ matrix.test_filter }}"
          skip_filter="${{ matrix.skip_filter }}"

          # Run Miri with the configured filters
          # test_filter: space-separated positive filters (libtest arguments)
          # skip_filter: --skip patterns for excluding slow tests
          # shellcheck disable=SC2086
          cargo miri test --lib -- $test_filter $skip_filter
        env:
          MIRIFLAGS: "-Zmiri-disable-isolation -Zmiri-many-seeds=${{ matrix.seeds }} -Zmiri-symbolic-alignment-check"

  # MSRV (Minimum Supported Rust Version) verification
  msrv-check:
    name: MSRV Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7

      - name: Extract MSRV from Cargo.toml
        id: cargo-msrv
        run: |
          MSRV=$(grep -E '^rust-version\s*=' Cargo.toml | sed 's/.*"\([^"]*\)".*/\1/')
          echo "msrv=$MSRV" >> "$GITHUB_OUTPUT"
          echo "Cargo.toml MSRV: $MSRV"

      - name: Extract Rust version from Dockerfile
        id: docker-rust
        run: |
          DOCKER_RUST=$(grep -E '^FROM rust:' docker/Dockerfile | sed 's/FROM rust:\([0-9.]*\).*/\1/')
          echo "docker_rust=$DOCKER_RUST" >> "$GITHUB_OUTPUT"
          echo "Dockerfile Rust: $DOCKER_RUST"

      - name: Verify MSRV matches Dockerfile
        run: |
          CARGO_MSRV="${{ steps.cargo-msrv.outputs.msrv }}"
          DOCKER_RUST="${{ steps.docker-rust.outputs.docker_rust }}"

          if [ "$CARGO_MSRV" != "$DOCKER_RUST" ]; then
            echo "❌ ERROR: MSRV mismatch!"
            echo "  Cargo.toml rust-version: $CARGO_MSRV"
            echo "  Dockerfile Rust version: $DOCKER_RUST"
            echo ""
            echo "The Dockerfile Rust version must match the Cargo.toml rust-version."
            echo "Update either docker/Dockerfile or Cargo.toml to fix this."
            exit 1
          fi

          echo "✅ MSRV versions match: $CARGO_MSRV"

      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.cargo-msrv.outputs.msrv }}

      - name: Verify build with MSRV
        run: cargo check --all-targets
        env:
          RUSTUP_TOOLCHAIN: ${{ steps.cargo-msrv.outputs.msrv }}

  # Feature flag combinations check
  feature-checks:
    name: Feature Flag Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install cargo-hack
        uses: ./.github/actions/install-cargo-tool
        with:
          tool: cargo-hack

      - name: Setup Rust cache
        uses: ./.github/actions/setup-rust-cache
        with:
          cache-key: feature

      - name: Check feature powerset (excluding slow features)
        run: cargo hack check --feature-powerset --exclude-features z3-verification,z3-verification-bundled,graphical-examples

  # Package dry-run
  package-dry-run:
    name: Package Dry Run
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7
      - name: Ensure crate is publishable (dry-run)
        run: cargo publish --dry-run

  # Semver compatibility check (enforced gate)
  #
  # cargo-semver-checks compares the public API of the working tree against the
  # latest version published on crates.io. A breaking API change is only allowed
  # when the crate version in Cargo.toml is bumped to permit it (for a pre-1.0
  # crate, a breaking change requires a *minor* bump, e.g. 0.9.x -> 0.10.0).
  #
  # This makes the check a true gate: a *deliberate* breaking change passes
  # because the matching version bump permits it, while an *accidental* breaking
  # change with no version bump fails CI. Document intended breaks in CHANGELOG.md
  # and run scripts/sync-version.sh so the Version Sync job stays green.
  semver-checks:
    name: Semver Check
    runs-on: ubuntu-latest
    # Backstop only: a warm sccache + target cache brings this well under a
    # minute. The first (cold) run after a Cargo.lock change can take longer.
    timeout-minutes: 20
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v7

      # Shared sccache + cargo caching. The composite action exports
      # RUSTC_WRAPPER to the job environment, so the cargo-semver-checks build
      # below reuses dependency compilations from the Build/WASM/Feature jobs via
      # the GHA backend. We also cache the isolated target dir the action builds
      # in (semver-checks/target); the action itself caches the baseline rustdoc.
      # Best-effort: a cache-service outage degrades to direct compilation and
      # never fails this gate.
      - name: Setup Rust cache
        uses: ./.github/actions/setup-rust-cache
        with:
          cache-key: semver
          cache-paths: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            semver-checks/target

      - name: Check semver compatibility
        id: semver
        uses: obi1kenobi/cargo-semver-checks-action@v2

      # Surface an actionable explanation in the job summary when the gate trips,
      # so the fix (bump + document, or revert) is visible without reading logs.
      - name: Explain semver failure
        if: failure() && steps.semver.outcome == 'failure'
        # Diagnostics only: never let a hiccup here mask the real semver failure.
        continue-on-error: true
        run: |
          version="$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)"
          {
            echo "### ❌ Semver check did not pass"
            echo ""
            echo "\`cargo-semver-checks\` failed before CI could accept this PR. This can mean"
            echo "either a real public-API compatibility break or a setup/dependency-resolution"
            echo "problem such as a crates.io network error. Use the failed step log above as"
            echo "the source of truth."
            echo ""
            echo "**Current crate version:** \`${version}\` (compared against the latest crates.io release)."
            echo ""
            echo "Resolve according to the log:"
            echo ""
            echo "1. **Semver finding** — if the log lists public-API incompatibilities, either"
            echo "   revert the accidental break or bump \`version\` in \`Cargo.toml\` (pre-1.0: a breaking"
            echo "   change needs a *minor* bump, e.g. \`0.9.x\` → \`0.10.0\`), add a CHANGELOG"
            echo "   section for it, then run \`./scripts/sync-version.sh\`."
            echo "2. **Setup or network failure** — rerun after the dependency source recovers;"
            echo "   if it repeats, inspect Cargo registry/network diagnostics before changing"
            echo "   production code."
            echo ""
            echo "Cargo network hardening for CI Cargo jobs is kept in \`.cargo/config.toml\`."
          } >> "$GITHUB_STEP_SUMMARY"

  # WASM build verification
  wasm-check:
    name: WASM Build Check (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        target:
          - wasm32-unknown-unknown
          - wasm32-unknown-emscripten

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain with WASM target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy

      - name: Setup Rust cache
        uses: ./.github/actions/setup-rust-cache
        with:
          cache-key: wasm-${{ matrix.target }}

      - name: Install wasm-bindgen CLI for browser runtime tests
        if: matrix.target == 'wasm32-unknown-unknown'
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@0.2.106

      - name: Check WASM build (no default features)
        run: cargo check --target ${{ matrix.target }} --no-default-features

      - name: Check WASM build (with sync-send feature)
        run: cargo check --target ${{ matrix.target }} --no-default-features --features sync-send

      - name: Check WASM build (with paranoid feature)
        run: cargo check --target ${{ matrix.target }} --no-default-features --features paranoid

      - name: Check WASM build (with json feature)
        run: cargo check --target ${{ matrix.target }} --no-default-features --features json

      - name: Check WASM build (with hot-join feature)
        run: cargo check --target ${{ matrix.target }} --no-default-features --features hot-join

      - name: Run clippy for WASM target
        run: cargo clippy --target ${{ matrix.target }} --no-default-features -- -D warnings

      - name: Run browser WASM runtime smoke test
        if: matrix.target == 'wasm32-unknown-unknown'
        env:
          CARGO_TARGET_WASM32_UNKNOWN_UNKNOWN_RUNNER: wasm-bindgen-test-runner
        run: cargo test -p wasm-browser-smoke --target ${{ matrix.target }} --lib -- --nocapture

      - name: Reject browser-only dependencies on Emscripten
        if: matrix.target == 'wasm32-unknown-emscripten'
        run: ./scripts/ci/check-emscripten-dependencies.sh

  # Real Godot web exports exercise the dynamic-linking boundary that compile
  # checks cannot validate. Both threaded and non-threaded modes run in Chromium.
  godot-emscripten:
    name: Godot Emscripten Browser
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GODOT_VERSION: "4.6.3"
      GODOT_RELEASE: "4.6.3-stable"
      GODOT_TEMPLATE_VERSION: "4.6.3.stable"
      GODOT_EDITOR_ARCHIVE: "Godot_v4.6.3-stable_linux.x86_64.zip"
      GODOT_TEMPLATES_ARCHIVE: "Godot_v4.6.3-stable_export_templates.tpz"
      GODOT_EDITOR_SHA256: "d0bc2113065e481c9c2c2b2c37daa4e8be3fe9e27f0ab9ab0b6096e9a37907f3"
      GODOT_TEMPLATES_SHA256: "3fbe2c0e2dec9d537ab9ec97bcf8da91dcf23357fc51f67092dd068d839290a8"
      GODOT_EDITOR_VERSION: "4.6.3.stable.official.7d41c59c4"
      GODOT_ROOT: ${{ github.workspace }}/.godot-ci/godot-4.6.3
      GODOT4_BIN: ${{ github.workspace }}/.godot-ci/godot-4.6.3/Godot_v4.6.3-stable_linux.x86_64
      XDG_DATA_HOME: ${{ github.workspace }}/.godot-ci/godot-4.6.3/xdg-data

    steps:
      - uses: actions/checkout@v7

      - name: Install Godot Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master snapshot
        with:
          toolchain: nightly-2026-07-08
          components: clippy,rust-src,rustfmt
          targets: wasm32-unknown-emscripten

      - name: Check Godot fixture formatting
        run: cargo +nightly-2026-07-08 fmt --manifest-path tests/godot-emscripten/Cargo.toml -- --check

      - name: Lint Godot fixture
        run: cargo +nightly-2026-07-08 clippy --manifest-path tests/godot-emscripten/Cargo.toml --locked --all-targets --all-features -- -D warnings

      - name: Install Emscripten SDK
        uses: emscripten-core/setup-emsdk@4528d102f7230f0e7b276855c01ea1159be0e984 # v16
        with:
          version: "4.0.11"
          actions-cache-folder: emsdk-cache

      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Restore Godot runtime files
        id: godot-cache
        uses: actions/cache/restore@v6
        continue-on-error: true
        with:
          path: |
            ${{ env.GODOT4_BIN }}
            ${{ env.XDG_DATA_HOME }}/godot/export_templates/${{ env.GODOT_TEMPLATE_VERSION }}/web_dlink_debug.zip
            ${{ env.XDG_DATA_HOME }}/godot/export_templates/${{ env.GODOT_TEMPLATE_VERSION }}/web_dlink_nothreads_debug.zip
          key: godot-${{ runner.os }}-${{ env.GODOT_EDITOR_SHA256 }}-${{ env.GODOT_TEMPLATES_SHA256 }}

      - name: Install verified Godot files
        if: steps.godot-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail

          readonly download_dir="${RUNNER_TEMP}/godot-downloads"
          readonly editor_archive="${download_dir}/${GODOT_EDITOR_ARCHIVE}"
          readonly templates_archive="${download_dir}/${GODOT_TEMPLATES_ARCHIVE}"
          readonly template_dir="${XDG_DATA_HOME}/godot/export_templates/${GODOT_TEMPLATE_VERSION}"
          readonly release_url="https://github.com/godotengine/godot-builds/releases/download/${GODOT_RELEASE}"

          rm -rf "${download_dir}"
          mkdir -p "${download_dir}" "${GODOT_ROOT}" "${template_dir}"
          trap 'rm -rf "${download_dir}"' EXIT

          curl --fail --location --retry 5 --retry-all-errors \
            --output "${editor_archive}" \
            "${release_url}/${GODOT_EDITOR_ARCHIVE}"
          curl --fail --location --retry 5 --retry-all-errors \
            --output "${templates_archive}" \
            "${release_url}/${GODOT_TEMPLATES_ARCHIVE}"

          printf '%s  %s\n' "${GODOT_EDITOR_SHA256}" "${editor_archive}" | sha256sum --check
          printf '%s  %s\n' "${GODOT_TEMPLATES_SHA256}" "${templates_archive}" | sha256sum --check

          unzip -q "${editor_archive}" -d "${GODOT_ROOT}"
          unzip -p "${templates_archive}" templates/web_dlink_debug.zip \
            > "${template_dir}/web_dlink_debug.zip"
          unzip -p "${templates_archive}" templates/web_dlink_nothreads_debug.zip \
            > "${template_dir}/web_dlink_nothreads_debug.zip"
          chmod +x "${GODOT4_BIN}"

          actual_version="$("${GODOT4_BIN}" --version)"
          if [[ "${actual_version}" != "${GODOT_EDITOR_VERSION}" ]]; then
            printf 'error: expected Godot %s, got %s\n' \
              "${GODOT_EDITOR_VERSION}" "${actual_version}" >&2
            exit 1
          fi
          unzip -tq "${template_dir}/web_dlink_debug.zip"
          unzip -tq "${template_dir}/web_dlink_nothreads_debug.zip"

      - name: Save verified Godot runtime files
        if: steps.godot-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        continue-on-error: true
        with:
          path: |
            ${{ env.GODOT4_BIN }}
            ${{ env.XDG_DATA_HOME }}/godot/export_templates/${{ env.GODOT_TEMPLATE_VERSION }}/web_dlink_debug.zip
            ${{ env.XDG_DATA_HOME }}/godot/export_templates/${{ env.GODOT_TEMPLATE_VERSION }}/web_dlink_nothreads_debug.zip
          key: godot-${{ runner.os }}-${{ env.GODOT_EDITOR_SHA256 }}-${{ env.GODOT_TEMPLATES_SHA256 }}

      - name: Install Xvfb authentication
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends xauth

      - name: Run Godot browser fixture
        env:
          INSTALL_PLAYWRIGHT: "1"
        run: ./tests/godot-emscripten/run.sh

      - name: Upload browser failure results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: godot-emscripten-browser-results
          path: tests/godot-emscripten/test-results/
          if-no-files-found: ignore
          retention-days: 7

  # ARM64 (aarch64) cross-compilation verification
  arm64-cross:
    name: ARM64 Cross-Compile
    runs-on: ubuntu-latest
    timeout-minutes: 35
    # Override linker settings to use the default GCC cross-compiler instead of clang+lld.
    # This avoids needing to install extra tools in the cross-rs container.
    # The .cargo/config.toml specifies clang+lld for faster local builds, but
    # Cross.toml passes through these env vars so CI can override to GCC.
    #
    # RUSTFLAGS must be cleared because .cargo/config.toml sets "-C link-arg=-fuse-ld=lld"
    # which is incompatible with GCC (GCC doesn't understand the -fuse-ld=lld flag).
    #
    # IMPORTANT: We must ALSO override the x86_64 (host) target settings because proc-macro
    # crates and build scripts compile for the HOST machine, not the cross-compile target.
    # The .cargo/config.toml specifies `clang` as the linker for x86_64, but clang is NOT
    # installed in the cross-rs Docker container (where the build runs). Using `cc` works everywhere.
    env:
      # Target (aarch64) linker settings
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUSTFLAGS: ""
      # Host (x86_64) linker settings - required for build scripts and proc-macros
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: cc
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: ""

    steps:
      - uses: actions/checkout@v7

      - name: Cache cargo registry and build
        uses: actions/cache@v6
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: arm64-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            arm64-${{ runner.os }}-cargo-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        uses: ./.github/actions/install-cargo-tool
        with:
          tool: cross

      - name: Check ARM64 build (no default features)
        run: cross check --target aarch64-unknown-linux-gnu --no-default-features

      - name: Check ARM64 build (default features)
        run: cross check --target aarch64-unknown-linux-gnu

      - name: Check ARM64 build (with sync-send feature)
        run: cross check --target aarch64-unknown-linux-gnu --features sync-send

      - name: Check ARM64 build (with paranoid feature)
        run: cross check --target aarch64-unknown-linux-gnu --features paranoid

      - name: Check ARM64 build (with json feature)
        run: cross check --target aarch64-unknown-linux-gnu --features json

      - name: Check ARM64 build (with tokio feature)
        run: cross check --target aarch64-unknown-linux-gnu --features tokio

      - name: Run clippy for ARM64 target
        run: cross clippy --target aarch64-unknown-linux-gnu --no-default-features -- -D warnings

      - name: Build ARM64 release (verify full compilation)
        run: cross build --target aarch64-unknown-linux-gnu --release
