name: CI - Network Tests (Nightly)

# Nightly "does it survive real sockets" lane.
#
# The extreme / flaky real-UDP chaos scenarios in tests/network/multi_process.rs
# are marked `#[ignore]` so they do NOT gate every PR (they are slow and
# contention-flaky on shared CI runners). Determinism under those conditions is
# covered deterministically and in-process by tests/network/in_process_chaos.rs.
#
# This workflow runs the ignored real-UDP extreme tests on a daily schedule (and
# on demand) to confirm they still survive real sockets + real wall-clock.

on:
  # Daily at 3 AM UTC
  schedule:
    - cron: '0 3 * * *'
  # Manual trigger
  workflow_dispatch:

concurrency:
  group: network-nightly-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  network-nightly:
    name: Network Tests Nightly (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Timeout budget (worst case, derived from the source of truth):
    #   * Test phase: every ignored multi_process test runs SERIALLY (the
    #     network-multi-process nextest group pins max-threads=1) -- ~34 of them
    #     today. Each is killed by the in-test harness at
    #     scaled(max(peer timeout))+30 s (tests/network/multi_process.rs), and the
    #     960 s per-test nextest budget (.config/nextest.toml) sits above that on
    #     every matrix OS. Per-peer timeouts span 90-600 s (the 600 s endurance run
    #     dominates; on macOS its harness ceiling is 600*1.5+30 = 930 s), so if
    #     EVERY test wedged to its deadline the serial sum is roughly 3 h.
    #   * Build phase: the build step is timeout_minutes 15 x max_attempts 2
    #     (+30 s retry_wait) = up to ~30 min on a cold cache.
    #   * Setup overhead: checkout + toolchain + nextest install + sccache +
    #     cache restore (the cache step alone caps at 5 min) = ~10 min.
    # Absolute worst case ~= 3 h + 30 + 10 = ~220 min; a realistic-pessimistic run
    # is ~110 min. fail-fast=false means every test always runs, so the job must
    # budget the WHOLE serial sum -- one wedged test does not cancel the rest.
    # 240 min keeps even a fully-wedged cold-build run from being SIGKILLed
    # mid-suite (failures are then reported by the in-test harness with
    # diagnostics), while still bounding a wedged runner far below GitHub's 6 h
    # (360 min) hosted-runner hard cap.
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v7

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install cargo-nextest
        uses: ./.github/actions/install-cargo-tool
        with:
          tool: cargo-nextest

      - name: Configure sccache
        id: sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        continue-on-error: true

      - name: Verify sccache is working (Unix)
        id: sccache-check-unix
        if: steps.sccache.outcome == 'success' && runner.os != 'Windows'
        run: ./scripts/ci/verify-sccache.sh
        continue-on-error: true

      - name: Verify sccache is working (Windows)
        id: sccache-check-windows
        if: steps.sccache.outcome == 'success' && runner.os == 'Windows'
        shell: bash
        run: ./scripts/ci/verify-sccache.sh
        continue-on-error: true

      - name: Set sccache working status
        id: sccache-check
        shell: bash
        run: |
          # Assign GitHub expressions to variables (avoids shellcheck SC2193)
          unix_working="${{ steps['sccache-check-unix'].outputs.working }}"
          windows_working="${{ steps['sccache-check-windows'].outputs.working }}"
          if [ "$unix_working" == "true" ] || [ "$windows_working" == "true" ]; then
            echo "working=true" >> "$GITHUB_OUTPUT"
          else
            echo "working=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Clear sccache env on failure
        if: steps.sccache.outcome != 'success' || steps.sccache-check.outputs.working != 'true'
        shell: bash
        run: |
          echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_ENABLED=" >> "$GITHUB_ENV"

      - name: Cache cargo registry and build
        uses: actions/cache@v6
        continue-on-error: true
        timeout-minutes: 5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: network-nightly-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            network-nightly-${{ runner.os }}-cargo-
            network-${{ runner.os }}-cargo-

      - name: Build network test peer
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 15
          max_attempts: 2
          retry_wait_seconds: 30
          retry_on_exit_code: 143
          command: cargo build --release -p network-test-peer
        env:
          RUSTC_WRAPPER: ${{ steps.sccache-check.outputs.working == 'true' && 'sccache' || '' }}
          SCCACHE_GHA_ENABLED: ${{ steps.sccache-check.outputs.working == 'true' && 'true' || 'false' }}
          SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
          SCCACHE_STARTUP_NOTIFY_TIMEOUT: "60"
          SCCACHE_IDLE_TIMEOUT: "0"

      - name: Run ignored extreme real-UDP network tests (nextest)
        run: cargo nextest run --profile ci-network-nightly --release --run-ignored ignored-only -E 'test(multi_process)' --test network
        env:
          # Nightly tier: stand the per-PR smoke-tier guard down so the ignored
          # loss-bearing real-UDP scenarios are allowed to run (the spawn_peer
          # guard enforces the smoke invariant unless this is set to `nightly`).
          FORTRESS_NETWORK_TIER: nightly
          RUSTC_WRAPPER: ${{ steps.sccache-check.outputs.working == 'true' && 'sccache' || '' }}
          SCCACHE_GHA_ENABLED: ${{ steps.sccache-check.outputs.working == 'true' && 'true' || 'false' }}
          SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
          SCCACHE_STARTUP_NOTIFY_TIMEOUT: "60"
          SCCACHE_IDLE_TIMEOUT: "0"

  # Docker tc/netem chaos lane (with packet loss).
  #
  # The per-PR Docker job (ci-network.yml) runs only the LOSS-FREE `--quick`
  # smoke scenarios because kernel-netem packet loss is flaky under CI host
  # starvation. The full netem suite (`--all`: packet loss 5/10/20%, poor /
  # terrible network, burst, reorder, dup) belongs here in the nightly lane,
  # alongside the ignored real-UDP scenarios above. Best-effort: a Docker Hub
  # registry blip must not fail the nightly run.
  docker-network-nightly:
    name: Network Tests Nightly (Docker netem)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Pre-pull base images (retry on registry flake)
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 15
          command: |
            docker pull rust:1.86-slim-bookworm
            docker pull debian:bookworm-slim

      - name: Build Docker image
        run: docker compose -f docker/docker-compose.yml build

      - name: Run Docker network tests (full netem suite, with loss)
        run: ./scripts/ci/docker-network-tests.sh --all
        timeout-minutes: 45

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: docker-network-nightly-results
          path: test-results/
          retention-days: 7
