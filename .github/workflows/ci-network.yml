name: CI - Network Tests

on:
  push:
    branches: [main]
    paths:
      - '**.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'docker/**'
      - 'scripts/ci/docker-network-tests.sh'
      - '.github/workflows/ci-network.yml'
  pull_request:
    branches: [main]
    paths:
      - '**.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'docker/**'
      - 'scripts/ci/docker-network-tests.sh'
      - '.github/workflows/ci-network.yml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Multi-process network tests (localhost) - cross-platform
  network-tests:
    name: Network Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install cargo-nextest
        uses: ./.github/actions/install-cargo-tool
        with:
          tool: cargo-nextest

      - name: Configure sccache
        id: sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        continue-on-error: true

      - name: Verify sccache is working (Unix)
        id: sccache-check-unix
        if: steps.sccache.outcome == 'success' && runner.os != 'Windows'
        run: ./scripts/ci/verify-sccache.sh
        continue-on-error: true

      - name: Verify sccache is working (Windows)
        id: sccache-check-windows
        if: steps.sccache.outcome == 'success' && runner.os == 'Windows'
        shell: bash
        run: ./scripts/ci/verify-sccache.sh
        continue-on-error: true

      - name: Set sccache working status
        id: sccache-check
        shell: bash
        run: |
          # Assign GitHub expressions to variables (avoids shellcheck SC2193)
          unix_working="${{ steps['sccache-check-unix'].outputs.working }}"
          windows_working="${{ steps['sccache-check-windows'].outputs.working }}"
          if [ "$unix_working" == "true" ] || [ "$windows_working" == "true" ]; then
            echo "working=true" >> "$GITHUB_OUTPUT"
          else
            echo "working=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Clear sccache env on failure
        if: steps.sccache.outcome != 'success' || steps.sccache-check.outputs.working != 'true'
        shell: bash
        run: |
          echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_ENABLED=" >> "$GITHUB_ENV"

      - name: Pre-cache marker
        shell: bash
        run: echo "PRE_CACHE=$(date -u +%FT%TZ)"

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        continue-on-error: true
        timeout-minutes: 5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: network-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            network-${{ runner.os }}-cargo-

      - name: Post-cache marker
        if: always()
        shell: bash
        run: echo "POST_CACHE=$(date -u +%FT%TZ)"

      - name: Build network test peer
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 15
          max_attempts: 2
          retry_wait_seconds: 30
          retry_on_exit_code: 143
          command: cargo build --release -p network-test-peer
        env:
          RUSTC_WRAPPER: ${{ steps.sccache-check.outputs.working == 'true' && 'sccache' || '' }}
          SCCACHE_GHA_ENABLED: ${{ steps.sccache-check.outputs.working == 'true' && 'true' || 'false' }}
          SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
          SCCACHE_STARTUP_NOTIFY_TIMEOUT: "60"
          SCCACHE_IDLE_TIMEOUT: "0"

      - name: Run multi-process network tests (nextest)
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 30
          max_attempts: 2
          retry_wait_seconds: 30
          retry_on_exit_code: 143
          command: cargo nextest run --profile ci --release -E 'test(multi_process)' --test network
        env:
          RUSTC_WRAPPER: ${{ steps.sccache-check.outputs.working == 'true' && 'sccache' || '' }}
          SCCACHE_GHA_ENABLED: ${{ steps.sccache-check.outputs.working == 'true' && 'true' || 'false' }}
          SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
          SCCACHE_STARTUP_NOTIFY_TIMEOUT: "60"
          SCCACHE_IDLE_TIMEOUT: "0"

  # Docker-based network tests with tc/netem.
  #
  # This job ONLY adds Linux tc/netem kernel chaos on top of the multi-process
  # tests; the three native-OS `network-tests` jobs above are the real
  # correctness gate (they run the same multi_process suite on ubuntu/windows/
  # macos). A transient Docker Hub registry blip (e.g. run 588:
  # `Get "https://registry-1.docker.io/v2/": context deadline exceeded`) must
  # never block a PR, so this job is best-effort: `continue-on-error` lets a
  # registry flake go yellow instead of red while the native gates still fail
  # hard on real regressions.
  docker-network-tests:
    name: Network Tests (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Pull the pinned base images up front with retry. The build below resolves
      # `rust:1.86-slim-bookworm` and `debian:bookworm-slim` from Docker Hub,
      # which intermittently times out (`registry-1.docker.io/v2/`: context
      # deadline exceeded). `docker compose build` has no built-in registry
      # retry, so we pre-pull here; cached layers make the subsequent build a
      # no-op pull.
      - name: Pre-pull base images (retry on registry flake)
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 15
          command: |
            docker pull rust:1.86-slim-bookworm
            docker pull debian:bookworm-slim

      - name: Build Docker image
        run: docker compose -f docker/docker-compose.yml build

      - name: Run Docker network tests (quick)
        run: ./scripts/ci/docker-network-tests.sh --quick
        timeout-minutes: 15

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: docker-network-test-results
          path: test-results/
          retention-days: 7
