name: CI - Documentation

on:
  push:
    branches: [main]
    paths:
      - "**.md"
      - "**.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".cargo/config.toml"
      - "docs/**"
      - "wiki/**"
      - "scripts/docs/**"
      - "scripts/tests/**"
      - "scripts/release/**"
      - "specs/tla/**"
      - "scripts/ci/check-doc-claims.sh"
      - "scripts/hooks/check-rust-semantic-claims.py"
      - "scripts/hooks/check-wire-golden-immutable.py"
      - "scripts/ci/check-derive-bounds.sh"
      - ".markdownlint.json"
      - ".markdown-link-check.json"
      - ".lychee.toml"
      - ".vale.ini"
      - ".vale/**"
      - ".github/actions/install-cargo-tool/**"
      - ".github/workflows/ci-docs.yml"
      - ".github/workflows/ci-rust.yml"
      - ".github/workflows/release-prepare.yml"
      - ".github/workflows/publish.yml"
      - ".github/workflows/ci-version-sync.yml"
      - ".github/workflows/ci-verification.yml"
  pull_request:
    branches: [main]
    paths:
      - "**.md"
      - "**.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".cargo/config.toml"
      - "docs/**"
      - "wiki/**"
      - "scripts/docs/**"
      - "scripts/tests/**"
      - "scripts/release/**"
      - "specs/tla/**"
      - "scripts/ci/check-doc-claims.sh"
      - "scripts/hooks/check-rust-semantic-claims.py"
      - "scripts/hooks/check-wire-golden-immutable.py"
      - "scripts/ci/check-derive-bounds.sh"
      - ".markdownlint.json"
      - ".markdown-link-check.json"
      - ".lychee.toml"
      - ".vale.ini"
      - ".vale/**"
      - ".github/actions/install-cargo-tool/**"
      - ".github/workflows/ci-docs.yml"
      - ".github/workflows/ci-rust.yml"
      - ".github/workflows/release-prepare.yml"
      - ".github/workflows/publish.yml"
      - ".github/workflows/ci-version-sync.yml"
      - ".github/workflows/ci-verification.yml"
  workflow_dispatch:

jobs:
  # ============================================================================
  # VALE PROSE LINT - Check documentation prose quality
  # ============================================================================
  # Note: Uses Vale CLI directly instead of errata-ai/vale-action to avoid
  # reviewdog's dependency on GitHub's Pull Request diff API, which fails
  # with HTTP 406 when PRs exceed GitHub's diff line limit (~3,000 lines).
  # See: https://github.com/reviewdog/reviewdog/issues/1696
  # ============================================================================
  vale-lint:
    name: Vale Prose Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true # Advisory, not blocking initially

    steps:
      - uses: actions/checkout@v7

      - name: Cache Vale styles
        uses: actions/cache@v6
        continue-on-error: true
        with:
          path: .vale/styles
          key: vale-styles-${{ hashFiles('.vale.ini') }}
          restore-keys: |
            vale-styles-

      - name: Install Vale CLI
        run: |
          # Pin to specific version for reproducibility
          VALE_VERSION="3.9.0"
          curl -sfL "https://github.com/errata-ai/vale/releases/download/v${VALE_VERSION}/vale_${VALE_VERSION}_Linux_64-bit.tar.gz" \
            | sudo tar xz -C /usr/local/bin vale
          vale --version

      - name: Sync Vale styles
        run: vale sync

      - name: Run Vale prose linter
        id: vale
        run: |
          set -o pipefail

          {
            echo "## Vale Prose Lint Results"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # Check if docs/ directory exists
          if [ ! -d docs/ ]; then
            echo "⚠️ docs/ directory not found, skipping Vale lint" >> "$GITHUB_STEP_SUMMARY"
            touch vale-output.txt
            exit 0
          fi

          # Run vale with line output format
          # Note: Vale returns 0 for suggestions/warnings, non-zero for errors/config issues
          # We check output file content to determine if issues were found
          set +e
          vale --output=line docs/ 2>&1 | tee vale-output.txt
          EXIT_CODE=$?
          set -e

          # Check for configuration errors (exit code >= 2)
          if [ $EXIT_CODE -ge 2 ]; then
            {
              echo "⚠️ Vale configuration error (exit code: $EXIT_CODE)"
              echo ""
              echo "\`\`\`"
              cat vale-output.txt
              echo "\`\`\`"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0  # Don't fail since continue-on-error: true handles this
          fi

          # Check if any issues were found by examining output file content
          if [ ! -s vale-output.txt ]; then
            echo "✅ No prose issues found in docs/" >> "$GITHUB_STEP_SUMMARY"
          else
            ISSUE_COUNT=$(wc -l < vale-output.txt | tr -d ' ')
            {
              echo "### Issues Found: ${ISSUE_COUNT}"
              echo ""
              echo "These are advisory suggestions to improve prose quality."
              echo ""
              echo "\`\`\`"
              head -100 vale-output.txt
              if [ "$ISSUE_COUNT" -gt 100 ]; then
                echo "... (truncated, see artifact for full report)"
              fi
              echo "\`\`\`"
            } >> "$GITHUB_STEP_SUMMARY"

            # Emit GitHub annotations from vale output (limit to 50 to avoid noise)
            # Handle both line formats:
            # - path:line:col:rule:message
            # - path:line:col:rule:severity:message
            head -50 vale-output.txt | while IFS= read -r finding; do
              [ -z "$finding" ] && continue

              IFS=: read -r file line col rule maybe_severity message <<< "$finding"
              [ -z "$file" ] && continue

              # In 5-field output, maybe_severity is actually the message.
              if [ -z "$message" ]; then
                severity="warning"
                message="$maybe_severity"
              else
                severity="$maybe_severity"
              fi

              case "$severity" in
                error)
                  level="error"
                  ;;
                warning)
                  level="warning"
                  ;;
                *)
                  level="notice"
                  ;;
              esac

              echo "::${level} file=${file},line=${line},col=${col}::[${rule}:${severity}] ${message}"
            done
          fi

      - name: Upload Vale report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: vale-report
          path: vale-output.txt
          retention-days: 7

  # ============================================================================
  # WIKI CONSISTENCY - Validate wiki links and structure
  # ============================================================================
  wiki-consistency:
    name: Wiki Consistency
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate wiki consistency
        run: python scripts/docs/check-wiki-consistency.py

      - name: Validate TLA FIX_MODE / config / prose consistency
        run: python scripts/docs/check-tla-config-consistency.py

  # ============================================================================
  # SCRIPT TESTS & WIKI DRY-RUN - Run all script tests and validate wiki generation
  # ============================================================================
  wiki-sync-dry-run:
    name: Script Tests & Wiki Dry-Run
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest pyyaml

      - name: Run script tests
        run: python -m pytest scripts/tests/ -v

      - name: Generate wiki (dry-run)
        run: python scripts/docs/sync-wiki.py --dest wiki-test-output

      - name: Validate generated wiki format
        run: python scripts/docs/validate-wiki-output.py --wiki-dir wiki-test-output

      - name: Verify committed wiki/ matches generated output
        run: |
          # The committed wiki/ mirror must equal what sync-wiki.py produces from
          # docs/, so hand-edited or stale mirror content cannot drift from the
          # docs source of truth (the source SYNC headers say "Edit docs source").
          if ! diff -rq wiki/ wiki-test-output/; then
            echo "::group::Wiki drift diagnostics"
            git diff --no-index --stat wiki/ wiki-test-output/ || true
            echo ""
            diff -ru wiki/ wiki-test-output/ | sed -n '1,240p' || true
            echo "::endgroup::"
            echo "::error::Committed wiki/ is out of sync with docs/. Run 'python scripts/docs/sync-wiki.py' and commit the regenerated wiki/."
            exit 1
          fi

  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Run markdownlint
        run: markdownlint '**/*.md' --config .markdownlint.json --ignore 'target/**' --ignore 'fuzz/target/**' --ignore 'loom-tests/target/**' --ignore 'progress/**' --ignore 'PLAN.md'

  # ============================================================================
  # CODE FENCE SYNTAX - Detect rustdoc-style attributes in markdown
  # ============================================================================
  code-fence-syntax:
    name: Code Fence Syntax
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v7

      - name: Check for rustdoc-style code fence attributes
        run: |
          set -o pipefail

          {
            echo "## Code Fence Syntax Check"
            echo ""
            echo "Checking for rustdoc-style code fence attributes (e.g., \`\`\`rust,ignore)..."
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if ./scripts/docs/check-code-fence-syntax.sh docs/ 2>&1 | tee code-fence-output.txt; then
            echo "✅ No rustdoc-style code fence attributes found" >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "❌ Found rustdoc-style code fence attributes:"
              echo ""
              echo "These attributes are only valid in Rust doc comments, not markdown files."
              echo "Use plain \`\`\`rust instead."
              echo ""
              echo "\`\`\`"
              cat code-fence-output.txt
              echo "\`\`\`"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Upload code fence report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: code-fence-report
          path: code-fence-output.txt
          retention-days: 7

  # ============================================================================
  # DOC CLAIMS - Check doc comments for misleading claims
  # ============================================================================
  doc-claims:
    name: Doc Claims Check
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v7

      - name: Check doc comment accuracy
        run: ./scripts/ci/check-doc-claims.sh

      - name: Check derive bounds
        run: ./scripts/ci/check-derive-bounds.sh

  link-check:
    name: Link Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7

      - name: Check local file links
        run: python3 scripts/docs/check-links.py

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install markdown-link-check
        run: npm install -g markdown-link-check

      - name: Check markdown links (external)
        run: |
          set +e
          total_files=0
          failed_files=0
          : > markdown-link-check-output.txt

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            total_files=$((total_files + 1))

            echo "FILE: $file" | tee -a markdown-link-check-output.txt
            markdown-link-check --config .markdown-link-check.json "$file" 2>&1 | tee -a markdown-link-check-output.txt
            status=${PIPESTATUS[0]}
            if [ "$status" -ne 0 ]; then
              failed_files=$((failed_files + 1))
            fi
            echo "" | tee -a markdown-link-check-output.txt
          done < <(
            find . -name "*.md" \
              -not -path "./target/*" \
              -not -path "./fuzz/target/*" \
              -not -path "./loom-tests/target/*" \
              -not -path "./wiki/*" \
              | sort
          )

          set -e
          {
            echo "## External Markdown Link Check"
            echo ""
            echo "- Files scanned: $total_files"
            echo "- Files with dead links: $failed_files"
            if [ "$failed_files" -gt 0 ]; then
              echo "- Result: advisory issues detected; see markdown-link-check-output.txt for details."
            else
              echo "- Result: no dead links found."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$failed_files" -gt 0 ]; then
            echo "::warning::markdown-link-check found dead links in $failed_files file(s). See markdown-link-check-output.txt for details."
          fi
        continue-on-error: true # External links may have rate limits

      - name: Upload external markdown-link-check report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: markdown-link-check-report
          path: markdown-link-check-output.txt
          retention-days: 7

  # ============================================================================
  # LYCHEE LINK CHECK - Fast link checking with caching
  # ============================================================================
  lychee-link-check:
    name: Lychee Link Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true # Advisory initially, may find different issues

    steps:
      - uses: actions/checkout@v7

      - name: Restore lychee cache
        uses: actions/cache@v6
        continue-on-error: true
        with:
          path: .lycheecache
          key: lychee-cache-${{ github.sha }}
          restore-keys: |
            lychee-cache-

      - name: Validate lychee config schema
        id: lychee_config
        uses: lycheeverse/lychee-action@v2
        continue-on-error: true
        with:
          args: >-
            --config .lychee.toml
            --dump
            README.md
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Annotate lychee config errors
        if: steps.lychee_config.outcome == 'failure'
        run: |
          echo "::error file=.lychee.toml::Lychee configuration validation failed. Compare against https://github.com/lycheeverse/lychee/blob/master/lychee.example.toml and check the Lychee Config Validation step logs for schema details."

      - name: Run lychee link checker
        id: lychee
        if: steps.lychee_config.outcome == 'success'
        uses: lycheeverse/lychee-action@v2
        with:
          # Check docs and top-level markdown files
          args: >-
            --config .lychee.toml
            --cache
            --no-progress
            'docs/**/*.md'
            'README.md'
            'CHANGELOG.md'
            'LICENSE*'
            '*.md'
          output: lychee-report.md
          fail: false # Don't fail the workflow on broken links initially
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Annotate lychee runtime errors
        if: always() && steps.lychee.outcome == 'failure'
        run: |
          echo "::warning::Lychee link check step failed. If logs mention 'unknown field' or 'TOML parse error', update .lychee.toml schema; otherwise review broken-link diagnostics in lychee-report.md."

      - name: Summarize lychee run
        if: always()
        run: |
          if [ "${{ steps.lychee_config.outcome }}" = "failure" ]; then
            {
              echo "## Lychee Link Check"
              echo ""
              echo "- Config validation: failed"
              echo "- Link scan: skipped"
              echo "- Action: fix .lychee.toml schema before trusting Lychee results."
            } >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.lychee.outcome }}" = "failure" ]; then
            {
              echo "## Lychee Link Check"
              echo ""
              echo "- Config validation: passed"
              echo "- Link scan: advisory failures detected"
              echo "- Action: inspect lychee-report.md artifact for failing URLs."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Lychee Link Check"
              echo ""
              echo "- Config validation: passed"
              echo "- Link scan: completed"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload lychee report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: lychee-report
          path: lychee-report.md
          retention-days: 7

  rustdoc-links:
    name: Rustdoc Link Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Note: We intentionally don't use sccache for doc builds because:
    # 1. Doc builds are fast and don't benefit much from compilation caching
    # 2. sccache can cause transient CI failures when GitHub Actions cache service is unavailable
    # 3. The complexity of sccache error handling outweighs any benefit for this job

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache cargo registry and build
        uses: actions/cache@v6
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: docs-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            docs-${{ runner.os }}-cargo-

      - name: Check for broken intra-doc links
        run: |
          # Clean any stale doc artifacts that might cause issues
          rm -rf target/doc

          # Run with comprehensive RUSTDOCFLAGS for strict documentation validation
          # All rustdoc-specific lints are enforced as errors
          RUSTDOCFLAGS="\
            -D warnings \
            -D rustdoc::broken_intra_doc_links \
            -D rustdoc::private_intra_doc_links \
            -D rustdoc::invalid_codeblock_attributes \
            -D rustdoc::invalid_html_tags \
            -D rustdoc::bare_urls" \
          cargo doc --no-deps

      - name: Check private and feature-gated rustdoc links
        run: |
          # Private and feature-gated doc comments are still source-controlled
          # documentation. Validate them with rustdoc itself instead of scanning
          # generated HTML, which has produced false positives on rustdoc-owned
          # synthetic links such as blanket-impl dispatcher anchors.
          RUSTDOCFLAGS="\
            -D warnings \
            -D rustdoc::broken_intra_doc_links \
            -D rustdoc::private_intra_doc_links \
            -D rustdoc::invalid_codeblock_attributes \
            -D rustdoc::invalid_html_tags \
            -D rustdoc::bare_urls" \
          cargo doc --no-deps --features hot-join,tokio,json,sync-send --document-private-items

  # ============================================================================
  # DOC TESTS - Verify all documentation examples compile and run
  # ============================================================================
  doc-tests:
    name: Documentation Examples
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v6
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: doctests-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            doctests-${{ runner.os }}-cargo-

      - name: Run documentation tests
        run: |
          set -o pipefail

          {
            echo "## Documentation Example Tests"
            echo ""
            echo "Compiling and running all code examples in documentation..."
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if cargo test --doc 2>&1 | tee doctest-output.txt; then
            # Count passed tests
            PASSED=$(grep -oP '\d+ passed' doctest-output.txt | head -1 || echo "0 passed")
            echo "✅ All doc tests passed ($PASSED)" >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "❌ Some doc tests failed:"
              echo ""
              echo "\`\`\`"
              tail -50 doctest-output.txt
              echo "\`\`\`"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Upload doctest report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: doctest-report
          path: doctest-output.txt
          retention-days: 7

  # ============================================================================
  # DOC COVERAGE - Measure documentation coverage percentage
  # ============================================================================
  doc-coverage:
    name: Documentation Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Measure documentation coverage
        run: |
          set -o pipefail

          {
            echo "## Documentation Coverage Report"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # Generate coverage report
          RUSTDOCFLAGS="-Z unstable-options --show-coverage" \
            cargo +nightly doc --no-deps 2>&1 | tee doc-coverage.txt

          # Extract and display coverage table
          {
            echo "\`\`\`"
            cat doc-coverage.txt
            echo "\`\`\`"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # Check for minimum coverage (advisory, doesn't fail build)
          if grep -q "Total" doc-coverage.txt; then
            COVERAGE=$(grep "Total" doc-coverage.txt | awk '{print $NF}' | tr -d '%')
            echo "**Total Documentation Coverage: ${COVERAGE}%**" >> "$GITHUB_STEP_SUMMARY"

            # Advisory warning if below 90%
            if [ -n "$COVERAGE" ] && [ "$(echo "$COVERAGE < 90" | bc -l 2>/dev/null || echo 0)" -eq 1 ]; then
              echo "⚠️ Coverage is below 90% target" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "✅ Coverage meets or exceeds 90% target" >> "$GITHUB_STEP_SUMMARY"
            fi
          fi
        continue-on-error: true # Nightly features may break, don't fail CI

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: doc-coverage-report
          path: doc-coverage.txt
          retention-days: 30

  # ============================================================================
  # MARKDOWN CODE VERIFY - Verify code samples in markdown docs compile
  # ============================================================================
  markdown-code-verify:
    name: Markdown Code Samples
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v6
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: markdown-code-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            markdown-code-${{ runner.os }}-cargo-

      - name: Verify markdown code samples
        run: |
          set -o pipefail

          {
            echo "## Markdown Code Sample Verification"
            echo ""
            echo "Verifying Rust code samples in docs/ directory compile..."
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # Run verification on docs/ directory with fail-fast for CI
          if ./scripts/docs/verify-markdown-code.sh --fail-fast docs/ 2>&1 | tee markdown-code-output.txt; then
            echo "✅ All markdown code samples compile successfully" >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "❌ Some markdown code samples failed to compile:"
              echo ""
              echo "\`\`\`"
              tail -100 markdown-code-output.txt
              echo "\`\`\`"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Upload verification report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: markdown-code-report
          path: markdown-code-output.txt
          retention-days: 7
