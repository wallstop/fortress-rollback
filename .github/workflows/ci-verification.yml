name: CI - Verification

on:
  push:
    branches: [main]
    paths:
      - '**.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'specs/**'
      - 'scripts/verification/verify-*.sh'
      - 'scripts/verification/check-kani-coverage.sh'
      - '.tla-tools-version'
      - '.github/workflows/ci-verification.yml'
  pull_request:
    branches: [main]
    paths:
      - '**.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'specs/**'
      - 'scripts/verification/verify-*.sh'
      - 'scripts/verification/check-kani-coverage.sh'
      - '.tla-tools-version'
      - '.github/workflows/ci-verification.yml'
  workflow_dispatch:

# Cancel stale verification runs when a newer commit lands on the same ref.
# Long-running Kani jobs are expensive and there's no value in finishing a
# run that has already been superseded. Other CI workflows in this repo
# (ci-quality, ci-mutation, ci-safety) follow the same pattern.
concurrency:
  group: verification-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Single source of truth for Kani version used by both `cargo install` and
  # the actions/cache key. Bump here to upgrade Kani; the cache key invalidates
  # automatically. Without this pinning, `cargo install --locked kani-verifier`
  # silently picks up new releases while the cache key never changes, so
  # runners keep restoring a stale cached binary forever.
  KANI_VERSION: '0.67.0'

jobs:
  # Validate Kani proof coverage before running actual proofs
  kani-coverage-check:
    name: Kani Proof Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - name: Validate Kani proof coverage
        run: ./scripts/verification/check-kani-coverage.sh
        # This ensures all #[kani::proof] functions are in tier lists

  # TLA+ Model Checking
  tla-verification:
    name: TLA+ Model Checking
    runs-on: ubuntu-latest
    # Job budget must exceed the verification step plus Java/TLA setup.
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache TLA+ tools
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: .tla-tools
          key: tla-tools-${{ hashFiles('.tla-tools-version') }}

      # No --fail-fast: every spec runs and is reported each time, so a single
      # slow/failing spec can no longer starve the ones after it (previously a
      # liveness blow-up in one spec hit the step timeout and left three specs
      # unchecked). Each spec is independently wall-clock-capped inside the
      # script (TLA_SPEC_TIMEOUT, default 900s) and runs multi-worker, so the
      # whole suite completes in a few minutes. A single runaway spec is caught
      # and attributed by its own per-spec cap while the rest still run; the
      # step timeout below is only a coarse backstop for the pathological case
      # of several specs regressing at once. The script exits non-zero if any
      # spec fails, failing the job.
      - name: Run TLA+ verification
        run: ./scripts/verification/verify-tla.sh
        timeout-minutes: 35

  # Z3 SMT Solver Verification
  z3-verification:
    name: Z3 SMT Verification
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install cargo-nextest
        uses: ./.github/actions/install-cargo-tool
        with:
          tool: cargo-nextest

      - name: Setup Rust cache
        uses: ./.github/actions/setup-rust-cache
        with:
          cache-key: z3

      - name: Install Z3 library
        run: sudo apt-get update && sudo apt-get install -y libz3-dev

      - name: Run Z3 verification tests (nextest)
        run: cargo nextest run --profile ci --test verification --features z3-verification -E 'test(z3)'
        timeout-minutes: 10

  # Kani Formal Verification (Tier 1 - Fast proofs)
  kani-tier1:
    name: Kani Tier 1 (Fast)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly

      - name: Cache Kani
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: |
            ~/.cargo/bin/cargo-kani
            ~/.cargo/bin/kani-*
            ~/.kani
          key: kani-${{ env.KANI_VERSION }}-${{ runner.os }}

      # Cache the cargo registry + git deps + target dir. Each matrix job
      # otherwise pays a full cold CBMC/codegen crate build, which dominates
      # per-job time. Keyed on Cargo.lock so it invalidates on dependency
      # changes; the restore-keys prefix lets a near-miss (same Kani version,
      # different lockfile) restore a warm target as a starting point.
      - name: Cache Kani build (cargo registry + target)
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: kani-build-${{ runner.os }}-${{ env.KANI_VERSION }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            kani-build-${{ runner.os }}-${{ env.KANI_VERSION }}-

      - name: Install Kani with retry
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 60
          command: |
            if ! command -v cargo-kani &> /dev/null; then
              cargo install --locked kani-verifier --version "${KANI_VERSION}"
              cargo kani setup
            fi

      - name: Verify toolchain
        run: |
          echo "=== Environment Diagnostics ==="
          echo "PATH: $PATH"
          echo "Cargo: $(which cargo)"
          echo "Rustc: $(rustc --version)"
          echo "Kani: $(cargo kani --version)"

      # Retry only on exit 143 (SIGTERM, runner preemption). Exit 1 (real
      # proof failure) and exit 124 (per-proof KANI_TIMEOUT) are not retried.
      # retry_on_exit_code is single-valued; spot reclaim can escalate to
      # SIGKILL (137) past the grace window -- if 137 recurs, switch to a
      # wrapper that handles both.
      - name: Run Kani verification (Tier 1 - Fast)
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 15
          max_attempts: 2
          retry_wait_seconds: 30
          retry_on_exit_code: 143
          command: ./scripts/verification/verify-kani.sh --quick --tier 1 --fail-fast --verbose

      - name: Annotate Kani runner-shutdown failures
        if: failure()
        run: |
          echo "::error file=src/sync_layer/mod.rs,line=2249::If this job ended with 'runner has received a shutdown signal', a proof likely caused CBMC state-space explosion (OOM). Suspect a symbolic kani::any() value driving a loop bound. See src/sync_layer/mod.rs:2249-2270 for the policy. Common fix: concretize the parameter that flows into the symbolic loop."

  # Kani Formal Verification (Tier 2 - Medium proofs, split into 6 parallel jobs)
  kani-tier2:
    name: Kani Tier 2 (${{ matrix.part }}/6)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        part: [1, 2, 3, 4, 5, 6]

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly

      - name: Cache Kani
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: |
            ~/.cargo/bin/cargo-kani
            ~/.cargo/bin/kani-*
            ~/.kani
          key: kani-${{ env.KANI_VERSION }}-${{ runner.os }}

      # Cache the cargo registry + git deps + target dir. Each matrix job
      # otherwise pays a full cold CBMC/codegen crate build, which dominates
      # per-job time. Keyed on Cargo.lock so it invalidates on dependency
      # changes; the restore-keys prefix lets a near-miss (same Kani version,
      # different lockfile) restore a warm target as a starting point.
      - name: Cache Kani build (cargo registry + target)
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: kani-build-${{ runner.os }}-${{ env.KANI_VERSION }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            kani-build-${{ runner.os }}-${{ env.KANI_VERSION }}-

      - name: Install Kani with retry
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 60
          command: |
            if ! command -v cargo-kani &> /dev/null; then
              cargo install --locked kani-verifier --version "${KANI_VERSION}"
              cargo kani setup
            fi

      - name: Verify toolchain
        run: |
          echo "=== Environment Diagnostics ==="
          echo "PATH: $PATH"
          echo "Cargo: $(which cargo)"
          echo "Rustc: $(rustc --version)"
          echo "Kani: $(cargo kani --version)"

      # --jobs omitted: verify-kani.sh runs one `cargo kani --harness X` per
      # proof; the matrix above is the parallelism mechanism.
      # Retry: same as Tier 1 -- only 143 (SIGTERM/preempt); 1 and 124 fail
      # immediately. See Tier 1 comment re: SIGKILL escalation.
      - name: Run Kani verification (Tier 2 - Part ${{ matrix.part }}/6)
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 10
          max_attempts: 2
          retry_wait_seconds: 30
          retry_on_exit_code: 143
          command: ./scripts/verification/verify-kani.sh --quick --tier 2 --part ${{ matrix.part }} --parts 6 --fail-fast

      - name: Annotate Kani runner-shutdown failures
        if: failure()
        run: |
          echo "::error file=src/sync_layer/mod.rs,line=2249::If this job ended with 'runner has received a shutdown signal', a proof likely caused CBMC state-space explosion (OOM). Suspect a symbolic kani::any() value driving a loop bound. See src/sync_layer/mod.rs:2249-2270 for the policy. Common fix: concretize the parameter that flows into the symbolic loop."

  # Kani Formal Verification (Tier 3 - Slow proofs, split into 5 parallel jobs)
  kani-tier3:
    name: Kani Tier 3 (${{ matrix.part }}/5)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        part: [1, 2, 3, 4, 5]

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly

      - name: Cache Kani
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: |
            ~/.cargo/bin/cargo-kani
            ~/.cargo/bin/kani-*
            ~/.kani
          key: kani-${{ env.KANI_VERSION }}-${{ runner.os }}

      # Cache the cargo registry + git deps + target dir. Each matrix job
      # otherwise pays a full cold CBMC/codegen crate build, which dominates
      # per-job time. Keyed on Cargo.lock so it invalidates on dependency
      # changes; the restore-keys prefix lets a near-miss (same Kani version,
      # different lockfile) restore a warm target as a starting point.
      - name: Cache Kani build (cargo registry + target)
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: kani-build-${{ runner.os }}-${{ env.KANI_VERSION }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            kani-build-${{ runner.os }}-${{ env.KANI_VERSION }}-

      - name: Install Kani with retry
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 60
          command: |
            if ! command -v cargo-kani &> /dev/null; then
              cargo install --locked kani-verifier --version "${KANI_VERSION}"
              cargo kani setup
            fi

      - name: Verify toolchain
        run: |
          echo "=== Environment Diagnostics ==="
          echo "PATH: $PATH"
          echo "Cargo: $(which cargo)"
          echo "Rustc: $(rustc --version)"
          echo "Kani: $(cargo kani --version)"

      # See Tier 1/2: --jobs omitted (per-harness invocation); retry only on
      # 143 (SIGTERM/preempt); 1 and 124 fail immediately.
      - name: Run Kani verification (Tier 3 - Part ${{ matrix.part }}/5)
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 20
          max_attempts: 2
          retry_wait_seconds: 30
          retry_on_exit_code: 143
          command: ./scripts/verification/verify-kani.sh --quick --tier 3 --part ${{ matrix.part }} --parts 5 --fail-fast

      - name: Annotate Kani runner-shutdown failures
        if: failure()
        run: |
          echo "::error file=src/sync_layer/mod.rs,line=2249::If this job ended with 'runner has received a shutdown signal', a proof likely caused CBMC state-space explosion (OOM). Suspect a symbolic kani::any() value driving a loop bound. See src/sync_layer/mod.rs:2249-2270 for the policy. Common fix: concretize the parameter that flows into the symbolic loop."

  # Loom Concurrency Testing (cross-platform)
  loom-tests:
    name: Loom Concurrency Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            loom-tests/target
          key: loom-${{ matrix.os }}-cargo-${{ hashFiles('loom-tests/Cargo.lock') }}
          restore-keys: |
            loom-${{ matrix.os }}-cargo-

      - name: Run Loom tests
        working-directory: loom-tests
        run: cargo test --release
        env:
          RUSTFLAGS: "--cfg loom"
          LOOM_MAX_PREEMPTIONS: 3
