name: Release - Publish Crate

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Version to publish (must match Cargo.toml)"
        required: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: release-${{ inputs.release_version }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Require default branch dispatch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF}" != "refs/heads/${DEFAULT_BRANCH}" ]; then
            echo "::error::Releases must run from ${DEFAULT_BRANCH}; got ${GITHUB_REF}."
            exit 1
          fi

      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Configure sccache
        id: sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        continue-on-error: true

      - name: Verify sccache is working
        id: sccache-check
        if: steps.sccache.outcome == 'success'
        run: ./scripts/ci/verify-sccache.sh
        continue-on-error: true

      - name: Clear sccache env on failure
        if: steps.sccache.outcome != 'success' || steps.sccache-check.outcome != 'success'
        run: |
          echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_ENABLED=" >> "$GITHUB_ENV"

      - name: Cache cargo registry and build
        uses: actions/cache@v6
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: publish-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            publish-${{ runner.os }}-cargo-

      - name: Verify release input and source metadata
        run: |
          set -euo pipefail
          CARGO_VERSION=$(awk -F '"' '/^version = "/ { print $2; exit }' Cargo.toml)
          INPUT_VERSION="${{ github.event.inputs.release_version }}"
          if ! printf '%s\n' "$INPUT_VERSION" | grep -Eq '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'; then
            echo "release_version must use strict X.Y.Z semver; got $INPUT_VERSION" >&2
            exit 1
          fi
          if [ "$INPUT_VERSION" != "$CARGO_VERSION" ]; then
            echo "workflow_dispatch input release_version=$INPUT_VERSION does not match Cargo.toml version $CARGO_VERSION" >&2
            exit 1
          fi

      - name: Auto-fix CHANGELOG release metadata (must already be committed)
        run: |
          bash ./scripts/sync-version.sh --changelog-only

      - name: Verify CHANGELOG release metadata
        run: |
          bash ./scripts/sync-version.sh --changelog-only --check

      - name: Fail if CHANGELOG sync produced uncommitted changes
        run: |
          if [ -n "$(git status --porcelain -- CHANGELOG.md)" ]; then
            echo "CHANGELOG.md is not synchronized in the committed source. Run 'bash ./scripts/sync-version.sh --changelog-only' and commit the result before publishing." >&2
            git --no-pager diff -- CHANGELOG.md
            exit 1
          fi

      - name: Package release artifact
        id: package
        run: |
          set -euo pipefail
          CARGO_VERSION=$(awk -F '"' '/^version = "/ { print $2; exit }' Cargo.toml)
          CRATE_NAME=$(awk -F '"' '/^name = "/ { print $2; exit }' Cargo.toml)
          cargo package --locked
          package_path="target/package/${CRATE_NAME}-${CARGO_VERSION}.crate"
          if [ ! -f "$package_path" ]; then
            echo "Packaged crate is missing: $package_path" >&2
            exit 1
          fi
          local_checksum=$(sha256sum "$package_path" | awk '{ print $1 }')
          printf '%s  %s\n' "$local_checksum" "$(basename "$package_path")" > "${package_path}.sha256"
          echo "crate_name=$CRATE_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$CARGO_VERSION" >> "$GITHUB_OUTPUT"
          echo "path=$package_path" >> "$GITHUB_OUTPUT"
          echo "checksum=$local_checksum" >> "$GITHUB_OUTPUT"
        env:
          RUSTC_WRAPPER: ${{ steps.sccache-check.outputs.working == 'true' && 'sccache' || '' }}
          SCCACHE_GHA_ENABLED: ${{ steps.sccache-check.outputs.working == 'true' && 'true' || 'false' }}
          SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
          SCCACHE_STARTUP_NOTIFY_TIMEOUT: "60"
          SCCACHE_IDLE_TIMEOUT: "0"

      - name: Upload packaged crate
        uses: actions/upload-artifact@v7
        with:
          name: fortress-rollback-${{ steps.package.outputs.version }}
          path: |
            ${{ steps.package.outputs.path }}
            ${{ steps.package.outputs.path }}.sha256
          if-no-files-found: error

      - name: Check crates.io publication state
        id: registry
        env:
          CRATE_NAME: ${{ steps.package.outputs.crate_name }}
          CARGO_VERSION: ${{ steps.package.outputs.version }}
          local_checksum: ${{ steps.package.outputs.checksum }}
        run: |
          set -euo pipefail
          response="${RUNNER_TEMP}/crates-io-version.json"
          status=$(curl --silent --show-error --location --output "$response" --write-out '%{http_code}' \
            "https://crates.io/api/v1/crates/${CRATE_NAME}/${CARGO_VERSION}")
          if [ "$status" = "404" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$status" != "200" ]; then
            echo "crates.io returned HTTP $status while checking ${CRATE_NAME} ${CARGO_VERSION}" >&2
            sed -n '1,20p' "$response"
            exit 1
          fi
          published_checksum=$(jq -r '.version.checksum // empty' "$response")
          if [ -z "$published_checksum" ] || [ "$published_checksum" != "$local_checksum" ]; then
            echo "Existing crates.io artifact checksum does not match the packaged crate." >&2
            echo "local=$local_checksum published=$published_checksum" >&2
            exit 1
          fi
          echo "${CRATE_NAME} ${CARGO_VERSION} already exists on crates.io with the packaged checksum; publish will be skipped."
          echo "publish=false" >> "$GITHUB_OUTPUT"

      - name: Publish to crates.io
        if: steps.registry.outputs.publish == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish --locked

      - name: Create and push git tag
        run: |
          set -euo pipefail
          CARGO_VERSION=$(awk -F '"' '/^version = "/ { print $2; exit }' Cargo.toml)
          TAG_NAME="v${CARGO_VERSION}"
          SOURCE_SHA=$(git rev-parse HEAD)
          existing_target=$(git ls-remote origin "refs/tags/${TAG_NAME}^{}" | awk '{ print $1 }')
          if [ -z "$existing_target" ]; then
            existing_target=$(git ls-remote origin "refs/tags/${TAG_NAME}" | awk '{ print $1 }')
          fi
          if [ -n "$existing_target" ]; then
            if [ "$existing_target" != "$SOURCE_SHA" ]; then
              echo "Tag ${TAG_NAME} already exists at ${existing_target}, expected ${SOURCE_SHA}." >&2
              exit 1
            fi
            echo "Tag ${TAG_NAME} already points at ${SOURCE_SHA}."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG_NAME" -m "Release $TAG_NAME"
          git push origin "$TAG_NAME"

      - name: Get version for release
        id: get_version
        run: |
          VERSION=$(awk -F '"' '/^version = "/ { print $2; exit }' Cargo.toml)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for release
        id: changelog
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          # Extract the section for this version from CHANGELOG.md
          # Matches from "## [X.Y.Z]" until the next "## [" or end of file
          CHANGELOG_CONTENT=$(awk -v ver="$VERSION" '
            BEGIN { found=0; printing=0 }
            /^## \[/ {
              if (printing) { exit }
              if ($0 ~ "\\[" ver "\\]") { found=1; printing=1; next }
            }
            printing { print }
          ' CHANGELOG.md)

          if [ -z "$CHANGELOG_CONTENT" ]; then
            CHANGELOG_CONTENT="Release $VERSION"
          fi

          # Write to file to preserve newlines
          echo "$CHANGELOG_CONTENT" > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          name: ${{ steps.get_version.outputs.tag }}
          body_path: release_notes.md
          files: |
            ${{ steps.package.outputs.path }}
            ${{ steps.package.outputs.path }}.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Finalize release metadata on default branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          RELEASE_TAG: ${{ steps.get_version.outputs.tag }}
          RELEASE_VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          set -euo pipefail
          # Runs AFTER cargo publish + tag + GitHub release so the working tree
          # can safely switch to the default branch. Two post-release fixups,
          # committed together to avoid racing pushes:
          #
          #  1. Stamp the changelog's '## [VERSION]' header with today's real
          #     release date (the committed source carries a dated placeholder so
          #     the routine sync-version --check gate passes during development).
          #  2. Sync the bug-report version dropdown. The standalone
          #     sync-issue-template workflow triggers on `release: [released]`,
          #     but a release created here with the default GITHUB_TOKEN does NOT
          #     emit that event (GitHub suppresses triggers from the default
          #     token to prevent recursion), so we sync inline instead.
          #
          # Note: this refreshes the *default branch* only. The published crate
          # and the git tag are made from the tag tree (above) and keep whatever
          # date the committed source had — acceptable because the changelog's
          # placeholder is normally set close to release; the release notes never
          # include the header date (see the awk extraction above).
          #
          # The loop re-derives both fixups from a freshly fetched tip on each
          # attempt, so a concurrent push to the default branch is handled by a
          # clean retry rather than a non-fast-forward failure.
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          RELEASE_DATE="$(date -u +%Y-%m-%d)"
          export FORTRESS_RELEASE_DATE="$RELEASE_DATE"
          for attempt in 1 2 3; do
            git fetch --depth=1 origin "$DEFAULT_BRANCH"
            git checkout -B "$DEFAULT_BRANCH" "origin/$DEFAULT_BRANCH"
            bash ./scripts/sync-version.sh --stamp-release-date --release-version "$RELEASE_VERSION"
            python3 scripts/ci/sync-issue-template-versions.py --ensure-version "$RELEASE_TAG"
            if ! grep -qF "## [$RELEASE_VERSION] - $RELEASE_DATE" CHANGELOG.md; then
              echo "CHANGELOG.md does not contain stamped release header: ## [$RELEASE_VERSION] - $RELEASE_DATE" >&2
              exit 1
            fi
            if ! grep -qF "        - $RELEASE_TAG" .github/ISSUE_TEMPLATE/bug_report.yml; then
              echo "bug_report.yml does not contain released version option: $RELEASE_TAG" >&2
              exit 1
            fi
            git add CHANGELOG.md .github/ISSUE_TEMPLATE/bug_report.yml
            if git diff --staged --quiet; then
              echo "Release metadata already up to date on ${DEFAULT_BRANCH}"
              exit 0
            fi
            git commit -m "chore: finalize release metadata for ${RELEASE_TAG}"
            if git push origin "HEAD:${DEFAULT_BRANCH}"; then
              echo "Pushed release metadata to ${DEFAULT_BRANCH} (attempt ${attempt})"
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}); retrying on a fresh tip" >&2
            git reset --hard "HEAD~1"
          done
          echo "Failed to push release metadata after 3 attempts" >&2
          exit 1
