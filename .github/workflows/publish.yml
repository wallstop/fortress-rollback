name: Release - Publish Crate

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Version to publish (must match reviewed release state)"
        required: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: release-${{ github.event.inputs.release_version }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Require default branch dispatch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF}" != "refs/heads/${DEFAULT_BRANCH}" ]; then
            echo "::error::Releases must run from ${DEFAULT_BRANCH}; got ${GITHUB_REF}."
            exit 1
          fi

      - name: Checkout trusted dispatch helpers
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          path: trusted
          persist-credentials: false

      - name: Install pinned Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.0.0
        with:
          python-version: "3.13.5"

      - name: Resolve trusted candidate source
        id: checkpoint
        env:
          INPUT_VERSION: ${{ github.event.inputs.release_version }}
          TRUSTED_DISPATCH_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          python3 trusted/scripts/release/release_checkpoint.py \
            --repo trusted \
            --candidate "${GITHUB_WORKSPACE}/candidate" \
            --state-file "${RUNNER_TEMP}/release-checkpoint.json" \
            resolve \
            --version "$INPUT_VERSION" \
            --trusted-sha "$TRUSTED_DISPATCH_SHA" >> "$GITHUB_OUTPUT"

      - name: Install pinned release Rust
        id: release-rust
        uses: ./trusted/.github/actions/install-pinned-release

      - name: Configure sccache
        id: sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
        continue-on-error: true

      - name: Verify sccache is working
        id: sccache-check
        if: steps.sccache.outcome == 'success'
        run: ./trusted/scripts/ci/verify-sccache.sh
        continue-on-error: true

      - name: Clear sccache env on failure
        if: steps.sccache.outcome != 'success' || steps.sccache-check.outcome != 'success'
        run: |
          echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_ENABLED=" >> "$GITHUB_ENV"

      - name: Cache cargo registry and build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.0.0
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            candidate/target
          key: publish-${{ runner.os }}-rust-${{ steps.release-rust.outputs.toolchain }}-cargo-${{ hashFiles('candidate/**/Cargo.lock') }}
          restore-keys: |
            publish-${{ runner.os }}-rust-${{ steps.release-rust.outputs.toolchain }}-cargo-

      - name: Verify immutable reviewed release state
        id: release
        env:
          INPUT_VERSION: ${{ github.event.inputs.release_version }}
        run: |
          set -euo pipefail
          python3 trusted/scripts/release/release_state.py \
            --repo-root "${GITHUB_WORKSPACE}/candidate" verify \
            --expected-version "$INPUT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify previous release tag exists
        env:
          PREVIOUS_VERSION: ${{ steps.release.outputs.previous_version }}
        run: |
          set -euo pipefail
          if ! git -C trusted ls-remote --exit-code --tags origin \
            "refs/tags/v${PREVIOUS_VERSION}" > "${RUNNER_TEMP}/previous-release-tag.txt"; then
            echo "Previous release tag v${PREVIOUS_VERSION} does not exist on origin." >&2
            exit 1
          fi

      - name: Verify synchronized release metadata
        env:
          FORTRESS_PROJECT_ROOT: ${{ github.workspace }}/candidate
        run: bash ./trusted/scripts/sync-version.sh --check

      - name: Check every Cargo workspace lock
        run: |
          python3 trusted/scripts/release/workspace_locks.py \
            --repo-root "${GITHUB_WORKSPACE}/candidate" check

      - name: Package release artifact
        id: package
        env:
          CARGO_VERSION: ${{ steps.release.outputs.target_version }}
          CRATE_NAME: ${{ steps.release.outputs.crate_name }}
          RUSTC_WRAPPER: ${{ steps.sccache-check.outputs.working == 'true' && 'sccache' || '' }}
          SCCACHE_GHA_ENABLED: ${{ steps.sccache-check.outputs.working == 'true' && 'true' || 'false' }}
          SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
          SCCACHE_STARTUP_NOTIFY_TIMEOUT: "60"
          SCCACHE_IDLE_TIMEOUT: "0"
        run: |
          set -euo pipefail
          cargo package --locked
          package_path="${GITHUB_WORKSPACE}/candidate/target/package/${CRATE_NAME}-${CARGO_VERSION}.crate"
          if [ ! -f "$package_path" ]; then
            echo "Packaged crate is missing: $package_path" >&2
            exit 1
          fi
          local_checksum=$(sha256sum "$package_path" | awk '{ print $1 }')
          printf '%s  %s\n' "$local_checksum" "$(basename "$package_path")" > "${package_path}.sha256"
          {
            echo "crate_name=$CRATE_NAME"
            echo "version=$CARGO_VERSION"
            echo "path=$package_path"
            echo "checksum=$local_checksum"
          } >> "$GITHUB_OUTPUT"
        working-directory: candidate

      - name: Upload packaged crate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: fortress-rollback-${{ steps.package.outputs.version }}
          path: |
            ${{ steps.package.outputs.path }}
            ${{ steps.package.outputs.path }}.sha256
          if-no-files-found: error

      - name: Create immutable release checkpoint
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          askpass="${RUNNER_TEMP}/release-git-askpass.sh"
          trap 'rm -f "$askpass"' EXIT
          # These variables intentionally expand only when Git invokes askpass.
          # shellcheck disable=SC2016
          printf '%s\n' \
            '#!/bin/sh' \
            'case "$1" in' \
            '  *Username*) printf "%s\\n" "x-access-token" ;;' \
            '  *Password*) printf "%s\\n" "$GITHUB_TOKEN" ;;' \
            '  *) exit 1 ;;' \
            'esac' > "$askpass"
          chmod 700 "$askpass"
          GIT_ASKPASS="$askpass" GIT_TERMINAL_PROMPT=0 \
            python3 trusted/scripts/release/release_checkpoint.py \
              --repo trusted \
              --candidate "${GITHUB_WORKSPACE}/candidate" \
              --state-file "${RUNNER_TEMP}/release-checkpoint.json" \
              create

      - name: Revalidate checkpoint immediately before crates.io
        run: |
          python3 trusted/scripts/release/release_checkpoint.py \
            --repo trusted \
            --candidate "${GITHUB_WORKSPACE}/candidate" \
            --state-file "${RUNNER_TEMP}/release-checkpoint.json" \
            verify

      - name: Publish or reconcile crates.io state
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
          CRATE_NAME: ${{ steps.package.outputs.crate_name }}
          CARGO_VERSION: ${{ steps.package.outputs.version }}
          LOCAL_CHECKSUM: ${{ steps.package.outputs.checksum }}
          RUSTC_WRAPPER: ${{ steps.sccache-check.outputs.working == 'true' && 'sccache' || '' }}
          SCCACHE_GHA_ENABLED: ${{ steps.sccache-check.outputs.working == 'true' && 'true' || 'false' }}
          SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
          SCCACHE_STARTUP_NOTIFY_TIMEOUT: "60"
          SCCACHE_IDLE_TIMEOUT: "0"
        run: |
          set -euo pipefail
          python3 ../trusted/scripts/release/publish_state.py \
            --crate "${CRATE_NAME}" \
            --version "${CARGO_VERSION}" \
            --checksum "${LOCAL_CHECKSUM}"
        working-directory: candidate

      - name: Extract changelog for release
        env:
          VERSION: ${{ steps.release.outputs.target_version }}
        run: |
          set -euo pipefail
          changelog_content=$(awk -v ver="$VERSION" '
            BEGIN { printing=0 }
            /^## \[/ {
              if (printing) { exit }
              if ($0 ~ "\\[" ver "\\]") { printing=1; next }
            }
            printing { print }
          ' candidate/CHANGELOG.md)
          if [ -z "$changelog_content" ]; then
            echo "CHANGELOG.md has no release notes for ${VERSION}." >&2
            exit 1
          fi
          printf '%s\n' "$changelog_content" > "${RUNNER_TEMP}/release_notes.md"

      - name: Revalidate checkpoint immediately before GitHub Release
        run: |
          python3 trusted/scripts/release/release_checkpoint.py \
            --repo trusted \
            --candidate "${GITHUB_WORKSPACE}/candidate" \
            --state-file "${RUNNER_TEMP}/release-checkpoint.json" \
            verify

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ steps.release.outputs.target_version }}
          PACKAGE_PATH: ${{ steps.package.outputs.path }}
        run: |
          set -euo pipefail
          assets=("${PACKAGE_PATH}" "${PACKAGE_PATH}.sha256")
          release_file="${RUNNER_TEMP}/github-release.json"
          release_error="${RUNNER_TEMP}/github-release.err"
          set +e
          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" > "$release_file" 2> "$release_error"
          release_lookup_exit=$?
          set -e
          if [ "$release_lookup_exit" -eq 0 ]; then
            gh release upload "$TAG" "${assets[@]}" --clobber \
              --repo "${GITHUB_REPOSITORY}"
            gh release edit "$TAG" --title "$TAG" --notes-file "${RUNNER_TEMP}/release_notes.md" \
              --draft=false --prerelease=false --repo "${GITHUB_REPOSITORY}"
            exit 0
          fi

          release_lookup_output=$(sed -n '1,40p' "$release_error")
          if ! printf '%s\n' "$release_lookup_output" | grep -E '(HTTP 404|Not Found|"status":"404")' > "${RUNNER_TEMP}/release-not-found.txt"; then
            echo "Failed to verify GitHub Release state for ${TAG}." >&2
            printf '%s\n' "$release_lookup_output" >&2
            exit "$release_lookup_exit"
          fi
          gh release create "$TAG" "${assets[@]}" --title "$TAG" \
            --notes-file "${RUNNER_TEMP}/release_notes.md" --verify-tag \
            --repo "${GITHUB_REPOSITORY}"
