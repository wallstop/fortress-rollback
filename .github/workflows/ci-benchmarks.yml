name: CI - Benchmarks

# Run benchmarks and track regressions. Historical results are informational
# because GitHub runner hardware varies between jobs. Pull requests use three
# paired base/merge comparisons on one runner as the hard regression gate.

on:
  push:
    branches: [main]
    paths:
      - '**.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.cargo/config.toml'
      - 'benches/**'
      - '.github/workflows/ci-benchmarks.yml'
  pull_request:
    branches: [main]
    paths:
      - '**.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.cargo/config.toml'
      - 'benches/**'
      - '.github/workflows/ci-benchmarks.yml'
  workflow_dispatch:  # Allow manual runs

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    if: github.event_name == 'pull_request'
    # Use a consistent runner for reproducible results
    # Note: Performance may vary between runner hardware revisions

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Configure sccache
        id: sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        continue-on-error: true

      - name: Verify sccache is working
        id: sccache-check
        if: steps.sccache.outcome == 'success'
        run: ./scripts/ci/verify-sccache.sh
        continue-on-error: true

      - name: Clear sccache env on failure
        if: steps.sccache.outcome != 'success' || steps.sccache-check.outcome != 'success'
        run: |
          echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_ENABLED=" >> "$GITHUB_ENV"

      - name: Cache cargo registry and build
        uses: actions/cache@v6
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: bench-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            bench-${{ runner.os }}-cargo-

      # Alternate base/merge order to offset thermal and shared-runner drift.
      # Criterion's median estimates are compared only with measurements from
      # this runner; a regression needs both a >1.50 median ratio and two votes.
      - name: Run paired Criterion regression gate
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          RAW_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          TESTED_MERGE_SHA: ${{ github.sha }}
          RUSTC_WRAPPER: ${{ steps.sccache-check.outputs.working == 'true' && 'sccache' || '' }}
          SCCACHE_GHA_ENABLED: ${{ steps.sccache-check.outputs.working == 'true' && 'true' || 'false' }}
          SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
          SCCACHE_STARTUP_NOTIFY_TIMEOUT: "60"
          SCCACHE_IDLE_TIMEOUT: "0"
        run: |
          set -euo pipefail
          original_sha="$(git rev-parse HEAD)"
          if [ "$original_sha" != "$TESTED_MERGE_SHA" ]; then
            echo "::error::Checkout $original_sha does not match tested merge $TESTED_MERGE_SHA."
            exit 1
          fi

          results="$PWD/benchmark-paired-results"
          rm -rf "$results"
          mkdir -p "$results"

          {
            echo "BASE_SHA=$BASE_SHA"
            echo "RAW_HEAD_SHA=$RAW_HEAD_SHA"
            echo "TESTED_MERGE_SHA=$TESTED_MERGE_SHA"
            echo "PAIR_ORDER=base-1/merge-1,merge-2/base-2,base-3/merge-3"
            rustc --version --verbose
            lscpu
          } | tee "$results/metadata.txt"

          for harness in benches/p2p_session.rs benches/sync_layer.rs; do
            if ! git cat-file -e "$BASE_SHA:$harness" || \
               ! git cat-file -e "$TESTED_MERGE_SHA:$harness" || \
               ! git diff --quiet "$BASE_SHA" "$TESTED_MERGE_SHA" -- "$harness"; then
              echo "::error::Gated benchmark harness differs or is missing: $harness"
              exit 1
            fi
          done

          restore_checkout() {
            git checkout --detach --quiet "$original_sha"
          }
          trap restore_checkout EXIT

          measure() {
            label="$1"
            revision="$2"
            git checkout --detach --quiet "$revision"
            rm -rf target/criterion
            cargo bench --bench p2p_session -- 'Message serialization'
            cargo bench --bench sync_layer
            cp -R target/criterion "$results/$label"
          }

          measure base-1 "$BASE_SHA"
          measure merge-1 "$TESTED_MERGE_SHA"
          measure merge-2 "$TESTED_MERGE_SHA"
          measure base-2 "$BASE_SHA"
          measure base-3 "$BASE_SHA"
          measure merge-3 "$TESTED_MERGE_SHA"
          restore_checkout
          trap - EXIT

          python3 scripts/ci/check-benchmark-regressions.py \
            --base "$results/base-1" --candidate "$results/merge-1" \
            --base "$results/base-2" --candidate "$results/merge-2" \
            --base "$results/base-3" --candidate "$results/merge-3" \
            --threshold 1.50

      - name: Upload paired benchmark results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-paired-results
          path: benchmark-paired-results/
          retention-days: 30

  benchmark-history:
    name: Track Benchmark History
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
      deployments: write

    steps:
      - uses: actions/checkout@v7

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Configure sccache
        id: sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        continue-on-error: true

      - name: Verify sccache is working
        id: sccache-check
        if: steps.sccache.outcome == 'success'
        run: ./scripts/ci/verify-sccache.sh
        continue-on-error: true

      - name: Clear sccache env on failure
        if: steps.sccache.outcome != 'success' || steps.sccache-check.outcome != 'success'
        run: |
          echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_ENABLED=" >> "$GITHUB_ENV"

      - name: Cache cargo registry and build
        uses: actions/cache@v6
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: bench-history-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            bench-history-${{ runner.os }}-cargo-

      - name: Run benchmarks for historical tracking
        run: |
          set -o pipefail
          cargo bench --bench p2p_session -- 'Message serialization' --output-format bencher | tee benchmark-gated-results.txt
          cargo bench --bench sync_layer -- --output-format bencher | tee -a benchmark-gated-results.txt
          cargo bench --bench input_queue -- --output-format bencher --warm-up-time 1 --measurement-time 2 | tee benchmark-informational-results.txt
          cargo bench --bench compression -- --output-format bencher --warm-up-time 1 --measurement-time 2 | tee -a benchmark-informational-results.txt
          cargo bench --bench p2p_session -- 'SyncTestSession|P2PSession|Message/' --output-format bencher --warm-up-time 1 --measurement-time 2 | tee -a benchmark-informational-results.txt
          cargo bench --bench h16p_mesh -- --output-format bencher --warm-up-time 1 --measurement-time 2 --sample-size 20 | tee -a benchmark-informational-results.txt
        env:
          RUSTC_WRAPPER: ${{ steps.sccache-check.outputs.working == 'true' && 'sccache' || '' }}
          SCCACHE_GHA_ENABLED: ${{ steps.sccache-check.outputs.working == 'true' && 'true' || 'false' }}
          SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
          SCCACHE_STARTUP_NOTIFY_TIMEOUT: "60"
          SCCACHE_IDLE_TIMEOUT: "0"

      - name: Check and create gh-pages branch if needed
        id: gh-pages-check
        run: |
          if git ls-remote --exit-code --heads origin gh-pages > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::gh-pages branch does not exist yet."
            if [ "${{ github.event_name }}" = "push" ]; then
              echo "Creating gh-pages branch for benchmark storage..."
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git checkout --orphan gh-pages
              git reset --hard
              git commit --allow-empty -m "Initialize gh-pages branch for benchmarks"
              git push origin gh-pages
              git checkout main
              echo "exists=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Track stable benchmark history
        if: steps.gh-pages-check.outputs.exists == 'true'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Fortress Rollback Benchmarks
          tool: 'cargo'
          output-file-path: benchmark-gated-results.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '150%'
          comment-on-alert: false
          comment-always: false
          fail-on-alert: false
          max-items-in-chart: 50
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: bench

      - name: Track informational benchmark results
        if: steps.gh-pages-check.outputs.exists == 'true'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Fortress Rollback Informational Benchmarks
          tool: 'cargo'
          output-file-path: benchmark-informational-results.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '150%'
          comment-on-alert: false
          comment-always: false
          fail-on-alert: false
          max-items-in-chart: 50
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: bench-informational
          skip-fetch-gh-pages: true

      - name: Skip benchmark storage (no gh-pages branch yet)
        if: steps.gh-pages-check.outputs.exists == 'false' && github.event_name != 'push'
        run: |
          echo "::notice::Skipping benchmark storage - gh-pages branch does not exist yet."
          echo "The gh-pages branch will be created when the first commit is pushed to main."

      - name: Upload historical benchmark results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-history-results
          path: |
            benchmark-gated-results.txt
            benchmark-informational-results.txt
          retention-days: 30

  # Quick benchmark sanity check (runs on every PR)
  benchmark-quick:
    name: Quick Benchmark Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    # Quick benchmarks run even if full benchmark fails.
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Configure sccache
        id: sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        continue-on-error: true

      - name: Verify sccache is working
        id: sccache-check
        if: steps.sccache.outcome == 'success'
        run: ./scripts/ci/verify-sccache.sh
        continue-on-error: true

      - name: Clear sccache env on failure
        if: steps.sccache.outcome != 'success' || steps.sccache-check.outcome != 'success'
        run: |
          echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_ENABLED=" >> "$GITHUB_ENV"

      - name: Cache cargo registry and build
        uses: actions/cache@v6
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: bench-quick-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            bench-quick-${{ runner.os }}-cargo-

      # Run a quick smoke test of benchmarks (1 sample each)
      - name: Smoke test benchmarks
        run: |
          cargo bench --bench input_queue -- --sample-size 10 --warm-up-time 1 --measurement-time 1
          cargo bench --bench p2p_session -- --sample-size 10 --warm-up-time 1 --measurement-time 1
          cargo bench --bench sync_layer -- --sample-size 10 --warm-up-time 1 --measurement-time 1
          cargo bench --bench compression -- --sample-size 10 --warm-up-time 1 --measurement-time 1
          cargo bench --bench h16p_mesh -- --sample-size 10 --warm-up-time 1 --measurement-time 1
        timeout-minutes: 10
        env:
          RUSTC_WRAPPER: ${{ steps.sccache-check.outputs.working == 'true' && 'sccache' || '' }}
          SCCACHE_GHA_ENABLED: ${{ steps.sccache-check.outputs.working == 'true' && 'true' || 'false' }}
          SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
          # Increase startup timeout to handle slow GitHub Actions runners
          SCCACHE_STARTUP_NOTIFY_TIMEOUT: "60"
          SCCACHE_IDLE_TIMEOUT: "0"
