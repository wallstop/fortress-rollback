---
name: Sync Issue Template Versions

# Release preparation commits the target version before recording the immutable
# release-source digest. This manual workflow is only a repair tool for importing
# externally created release versions; automated publication never mutates source.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-issue-template
  cancel-in-progress: false

jobs:
  sync-versions:
    name: Sync Release Versions Into Issue Template
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.0.0
        with:
          python-version: "3.12"

      - name: Sync versions into bug report template
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/ci/sync-issue-template-versions.py

      - name: Commit and push changes
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/ISSUE_TEMPLATE/bug_report.yml
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          MSG="chore: sync release versions in bug report template"
          git commit -m "$MSG"
          git push origin "HEAD:${DEFAULT_BRANCH}"
