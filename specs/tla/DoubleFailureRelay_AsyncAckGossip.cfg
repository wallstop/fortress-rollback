SPECIFICATION Spec

\* DEMONSTRATION CONFIG (NOT the default; not registered in verify-tla.sh) — the
\* machine-checked NEGATIVE result that the PASSIVELY-GOSSIPED drop-epoch (exactly the
\* S46 wire primitive) is NECESSARY but NOT SUFFICIENT on the player side (Session 47).
\*
\* FIX_MODE = "AsyncAckGossip" models the in-flight ack round (idealization (a)
\* discharged) + per-observer async death (idealization (b) discharged) + a drop-epoch
\* freshness gate where the observer counts an ack as fresh iff its epoch is NOT below
\* the latest epoch the observer has heard for that peer VIA GOSSIP (cacheEpoch). This is
\* the cheapest way to "read the epoch as a commitment": compare the ack's epoch against
\* the gossip cache — no extra round-trip, no sender-side commitment.
\*
\* It is UNSOUND. TLC reports a safety invariant VIOLATED via the in-flight recursion of
\* the corroborate-then-drop race: the lowering peer's epoch-bump GOSSIP races the
\* observer's lock. An observer that has not YET received the bump gossip still sees
\* ackEpoch == cacheEpoch, treats its stale-HIGH ack as fresh, and confirms+locks the
\* dropped slot's real inputs above the eventual freeze. The passive gossip cache lags the
\* peer's own in-flight drop — the SAME intrinsic obstruction as the S44 InheritedFloor
\* corroborate-then-drop race, now at the epoch layer. This is the evidence that the src/
\* fix CANNOT merely compare the gossiped epoch in remote_slot_confirmed_bound; it needs a
\* genuine fresh-ack ROUND postdating the observer's intent (NOT a passive comparison). Note
\* that even an active two-phase commitment (FIX_MODE "AsyncAckTwoPhase") is STILL UNSOUND
\* (S47 — the departed-low race per-observer death exposes), so the sound consumer
\* additionally needs a pessimistic-queue-min report and no partition-hold.
\*
\* Expected result: TLC reports a safety invariant violated (NoConfirmedDivergence or its
\* single-survivor sharpening LockedRecordMatchesFreeze). Run manually:
\*   java -XX:+UseParallelGC -Xmx4g -jar .tla-tools/tla2tools.jar -workers auto -deadlock \
\*        -config specs/tla/DoubleFailureRelay_AsyncAckGossip.cfg \
\*        specs/tla/DoubleFailureRelay.tla
\* Do NOT add this config to verify-tla.sh; it is meant to FAIL (on a safety invariant).
CONSTANT SURVIVORS = {a, b, c}
CONSTANT MAX_FRAME = 3
CONSTANT NULL_FRAME = 999
CONSTANT WINDOW = 1
CONSTANT RECEIPTS = {0, 3}
CONSTANT EPOCH_MAX = 2
CONSTANT FIX_MODE = "AsyncAckGossip"

INVARIANT TypeInvariant
INVARIANT NoConfirmedDivergence
INVARIANT LockedRecordMatchesFreeze
INVARIANT FreezeNeverBelowGlobalMin
INVARIANT RecordedSourceInRange

\* S49: warm-cache convention (the established DoubleFailureRelay scope) — unchanged.
CONSTANT COLD_CACHE = FALSE
