SPECIFICATION Spec

\* S54 CONCRETE-SEQ ROUND POSITIVE (SAFETY) — the IMPLEMENTABLE reorder-sound mode. It is the
\* machine-checked discharge of the AsyncAckSoundRound idealization S52 left "asserted, not
\* machine-checked", and a STRICTLY SIMPLER realization: instead of reading the source's CURRENT
\* floorEpoch (re-rounding on every floor-LOWERING — which needs a per-source FLOOR-epoch on the
\* wire), the observer keys the round's freshness to its OWN PRUNE generation. It trusts a folded
\* reachable relay's pessimistic floor ONLY from an ack that POSTDATES its most recent Prune
\* (`ackFresh`): a SendAck after the prune sets it, any Prune by the observer resets its whole row,
\* and a reordered StaleAck never sets it.
\*
\* SOUND because a Prune requires `gone[origin]` and a `gone` source cannot Gossip, so once the
\* observer has pruned the dying global-min ORIGIN the origin can no longer lower any relay's
\* pessimistic floor — the relay's floor is SETTLED, and the post-prune ack captures it (the
\* relayed origin's low if the origin relayed before dying, else a high the origin can no longer
\* lower). The reordered StaleAck cannot satisfy the hold, so the STALE-FIRST race that
\* machine-DISPROVES the passive AsyncAckSoundEpoch (DoubleFailureRelay_AsyncAckSoundEpoch_Reorder.cfg)
\* cannot fire. The RED control is AsyncAckSoundFresh under reorder
\* (DoubleFailureRelay_AsyncAckSoundFresh_Reorder.cfg — trust any received ack -> residual reproduces),
\* proving the post-prune freshness is load-bearing. This is the production `src/` design: a
\* sequence-numbered request/response round the observer re-issues per prune, with NO floor-epoch wire
\* field.
\*
\* Expected result: PASS (the SAFETY invariants — no violation). SYMMETRY RelaySymmetry is SOUND for a
\* safety-only check. As with AsyncAckSoundRound, the cold-GOSSIP reorder space is large (~10^8
\* distinct states); the cheap RED/NEGATIVE controls are the substantive findings (they STOP at the
\* first violation in ~10-15 s). LIVENESS
\* (DoubleFailureRelay_AsyncAckSoundRoundSeq_Reorder_Live.cfg) and NON-VACUITY
\* (DoubleFailureRelay_AsyncAckSoundRoundSeq_Reorder_Witness.cfg) are checked on tractable companions.
\* Run manually:
\*   java -jar .tla-tools/tla2tools.jar -deadlock -config \
\*        specs/tla/DoubleFailureRelay_AsyncAckSoundRoundSeq_Reorder.cfg specs/tla/DoubleFailureRelay.tla
CONSTANT SURVIVORS = {a, b, c}
CONSTANT MAX_FRAME = 3
CONSTANT NULL_FRAME = 999
CONSTANT WINDOW = 1
CONSTANT RECEIPTS = {0, 3}
CONSTANT EPOCH_MAX = 1
CONSTANT FIX_MODE = "AsyncAckSoundRoundSeq"
CONSTANT COLD_CACHE = FALSE
CONSTANT REORDER = TRUE
SYMMETRY RelaySymmetry

INVARIANT TypeInvariant
INVARIANT NoConfirmedDivergence
INVARIANT LockedRecordMatchesFreeze
INVARIANT FreezeNeverBelowGlobalMin
INVARIANT RecordedSourceInRange
