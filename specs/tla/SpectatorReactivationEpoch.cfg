SPECIFICATION Spec

\* DEFAULT config — the Session-46 fix (FIX_MODE = "Epoch"): the per-slot
\* connect-status epoch gates ON. The spectator advances a per-(host,player)
\* epoch high-water on every report, records a drop witness only when the
\* report's epoch is NOT strictly below that high-water (closing the CROSS-CYCLE
\* stale-re-arm fail-open), and follows a `disconnected->connected` reactivation
\* only when the incoming report's epoch >= the witnessed drop's epoch (closing
\* the WITHIN-CYCLE reordered-pre-drop-snapshot fail-open). Registered in
\* verify-tla.sh; PASSES every safety property (~11k distinct states, ~3s single
\* worker).
\*
\* Bounds rationale (this repo's devcontainer, single TLC worker as
\* verify-tla.sh / CI runs it):
\* - HOSTS = {1, 2}: the canonical is the fixed Min(HOSTS) = 1 (host failover is
\*   OUT OF SCOPE here -- see the spec SCOPE header). The within-cycle fail-open
\*   reproduces via the canonical's OWN reordered reports (single canonical), and
\*   the second host drives multi-host converge-DOWN (LatchAtOrBelowLiveMin) and
\*   the witness table. (A third host adds only more convergence interactions at a
\*   large state cost.)
\* - MAXGEN = 3: generations 0..3 = connected, dropped, rejoined, dropped. The
\*   WITHIN-CYCLE corner needs one drop (gen 1) plus a reordered pre-drop
\*   connected snapshot (gen 0); MAXGEN = 3 additionally exercises the multi-cycle
\*   drop-rejoin-drop STRUCTURE (so a follow/consume and a re-adopt are reachable,
\*   and the latch can be driven BACKWARD across cycles -- the generalized
\*   within-cycle the provenance epoch clause must reject). The CROSS-CYCLE
\*   RESURRECTION itself (a consumed witness re-armed stale, then a different host
\*   becoming canonical) needs host failover and is out of scope; the high-water
\*   stale-reject that guards it is modeled faithfully (EpochProvOnly confirms it
\*   is not binding at this bound) and exercised at the gate/unit level by the
\*   production test cross_cycle_stale_drop_epoch_blocks_resurrect_after_consume.
\* - MAX_FRAME = 2: drop freeze frames {1, 2}. Two distinct values are the
\*   minimum that makes converge-DOWN observable (a host frozen at 2 converging
\*   to a peer's 1) and lets an earlier-cycle freeze numerically cover a later
\*   cycle's lower converged freeze.
\* - NULL_FRAME = 999 is the "no witness" sentinel, outside 0..MAX_FRAME.
\* - hostFreeze is an adversarial fixed-at-Init per-host choice (each host's
\*   asymmetric high-water received frame); it never changes, so it enlarges
\*   only the initial-state set, not the reachable depth.
\* - No SYMMETRY: canonical = Min(HOSTS) makes the host index privileged (no
\*   permutation symmetry).
CONSTANT HOSTS = {1, 2}
CONSTANT MAX_FRAME = 2
CONSTANT NULL_FRAME = 999
CONSTANT MAXGEN = 3
CONSTANT FIX_MODE = "Epoch"

CONSTRAINT StateConstraint

\* Safety invariants
INVARIANT TypeInvariant
INVARIANT NoFalseResurrection
INVARIANT LatchAtOrBelowLiveMin
INVARIANT GateAcceptsBoundaryWitness
INVARIANT SafetyInvariant

\* Action property: a disconnected slot's freeze frame is never raised.
PROPERTY FreezeNeverRaised
