SPECIFICATION Spec

\* MODE-ISOLATION config (run MANUALLY; NOT auto-run by verify-tla.sh, like the
\* DoubleFailureRelay variant cfgs).
\*
\* Run manually:
\*   java -jar .tla-tools/tla2tools.jar \
\*        -config specs/tla/SpectatorReactivationEpoch_EpochProvOnly.cfg \
\*        specs/tla/SpectatorReactivationEpoch.tla
\*
\* Differs from SpectatorReactivationEpoch.cfg in: FIX_MODE = "EpochProvOnly"
\* (the reactivation_provenance epoch clause `incoming_epoch >= witness.epoch`
\* stays ON, but the witness_host_status_reports high-water stale-reject
\* `is_stale = epoch < high_water` is turned OFF). It PASSES every safety
\* property -- which is the POINT: it isolates the provenance epoch clause as the
\* gate that is load-bearing at this fixed-canonical bound, and confirms the
\* high-water stale-reject is modeled faithfully but is NOT binding here (its
\* cross-cycle re-arm-from-consumed only becomes reachable under host failover,
\* which is out of scope -- see the SCOPE header; the cross-cycle gate is exercised
\* at the gate/unit level by the production test
\* cross_cycle_stale_drop_epoch_blocks_resurrect_after_consume). This mirrors the
\* honesty SpectatorFailover.tla applies to its consume/re-arm machinery
\* ("modeled faithfully but NOT load-bearing at this bound; removing it leaves
\* every property GREEN").
CONSTANT HOSTS = {1, 2}
CONSTANT MAX_FRAME = 2
CONSTANT NULL_FRAME = 999
CONSTANT MAXGEN = 3
CONSTANT FIX_MODE = "EpochProvOnly"

CONSTRAINT StateConstraint

INVARIANT TypeInvariant
INVARIANT NoFalseResurrection
INVARIANT LatchAtOrBelowLiveMin
INVARIANT GateAcceptsBoundaryWitness
INVARIANT SafetyInvariant

PROPERTY FreezeNeverRaised
