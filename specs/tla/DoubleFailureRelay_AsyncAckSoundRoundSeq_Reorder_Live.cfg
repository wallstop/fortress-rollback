SPECIFICATION Spec

\* S54 LIVENESS ANCHOR for the concrete-seq reorder-sound mode AsyncAckSoundRoundSeq. Checks
\* ConfirmationProgresses (every alive survivor eventually fully-confirms the dropped slot) — i.e. the
\* post-prune fresh-ack-ROUND HOLD always RESOLVES and never permanently pins confirmation (the
\* Tombstone failure mode). NO SYMMETRY (TLC symmetry is unsound for liveness).
\*
\* Bounds: SURVIVORS = {a, b} / MAX_FRAME = 2, the smallest configuration that completes (matching
\* DoubleFailureRelay_AsyncAckSoundRound_Reorder_Live.cfg). Two survivors still exercise the round HOLD
\* (each holds until a post-prune ack from the other). The hold resolves because: a Prune resets
\* `ackFresh` only finitely often (each peer is pruned at most once), and WF SendAck then delivers a
\* post-prune ack that re-sets `ackFresh` TRUE, clearing the blocker — unlike Tombstone, which
\* structurally retains a dead peer's low term with no fair release. The 3-survivor relay-shape
\* liveness is covered by this structural argument (bounded prunes + WF SendAck + WF Prune), mirroring
\* the AsyncAckSoundRound_Reorder_Live convention.
CONSTANT SURVIVORS = {a, b}
CONSTANT MAX_FRAME = 2
CONSTANT NULL_FRAME = 999
CONSTANT WINDOW = 1
CONSTANT RECEIPTS = {0, 2}
CONSTANT EPOCH_MAX = 1
CONSTANT FIX_MODE = "AsyncAckSoundRoundSeq"
CONSTANT COLD_CACHE = FALSE
CONSTANT REORDER = TRUE

INVARIANT TypeInvariant
INVARIANT NoConfirmedDivergence
INVARIANT LockedRecordMatchesFreeze
INVARIANT FreezeNeverBelowGlobalMin
INVARIANT RecordedSourceInRange

PROPERTY ConfirmationProgresses
