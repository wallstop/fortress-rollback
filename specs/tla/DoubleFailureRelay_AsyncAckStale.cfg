SPECIFICATION Spec

\* DEMONSTRATION CONFIG (NOT the default; not registered in verify-tla.sh) — the
\* control that proves the drop-epoch COMMITMENT is load-bearing once the ack is
\* in-flight (Session 47).
\*
\* FIX_MODE = "AsyncAckStale" is IDENTICAL to AsyncAckGossip (same concrete in-flight
\* ack round + per-observer death) EXCEPT it drops the epoch FRESHNESS gate: the
\* observer advances to its last-received acked floor REGARDLESS of whether a newer
\* drop-epoch has superseded it. Expected: TLC reports `NoConfirmedDivergence` VIOLATED
\* via the in-flight recursion of the corroborate-then-drop race — a peer sends a
\* stale-HIGH ack, then lowers its floor (bumping its epoch) before a fresh ack
\* refreshes the observer, and the observer confirms+locks the slot's real inputs above
\* the eventual freeze. This is the model-level proof that discharging idealization (a)
\* WITHOUT the epoch commitment is unsound: the fresh-ack round alone does not suffice;
\* the per-slot drop-epoch that makes a stale ack detectable is necessary.
\*
\* Expected result: TLC reports "Invariant NoConfirmedDivergence is violated".
\* Run manually:
\*   java -XX:+UseParallelGC -Xmx4g -jar .tla-tools/tla2tools.jar -workers auto -deadlock \
\*        -config specs/tla/DoubleFailureRelay_AsyncAckStale.cfg \
\*        specs/tla/DoubleFailureRelay.tla
\* Do NOT add this config to verify-tla.sh; it is meant to FAIL (on the safety invariant).
CONSTANT SURVIVORS = {a, b, c}
CONSTANT MAX_FRAME = 3
CONSTANT NULL_FRAME = 999
CONSTANT WINDOW = 1
CONSTANT RECEIPTS = {0, 3}
CONSTANT EPOCH_MAX = 2
CONSTANT FIX_MODE = "AsyncAckStale"

\* Only the safety invariants — the counterexample is a safety violation (the in-flight
\* stale-ack race), mirroring _Baseline / _InheritedFloor.
INVARIANT TypeInvariant
INVARIANT NoConfirmedDivergence
INVARIANT LockedRecordMatchesFreeze
INVARIANT FreezeNeverBelowGlobalMin
INVARIANT RecordedSourceInRange

\* S49: warm-cache convention (the established DoubleFailureRelay scope) — unchanged.
CONSTANT COLD_CACHE = FALSE
CONSTANT REORDER = FALSE
