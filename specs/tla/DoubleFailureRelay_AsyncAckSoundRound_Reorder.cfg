SPECIFICATION Spec

\* S52 MID-GAME-DROP-REORDER POSITIVE (SAFETY) — the reorder-SOUND mode. AsyncAckSoundRound is
\* AsyncAckSoundFresh PLUS a fresh-ack ROUND: the advance HOLDS for any folded reachable peer whose
\* cached ack floor-epoch is below that peer's CURRENT floorEpoch, so a reordered stale snapshot (at
\* an older floor-epoch than the peer now holds) never completes the round and the observer holds
\* until a current-generation pessimistic ack — which surfaces the relayed origin's low — lands.
\*
\* This is the POSITIVE of the S52 reorder ladder; the NEGATIVE is
\* DoubleFailureRelay_AsyncAckSoundEpoch_Reorder.cfg (a PASSIVE gossip-epoch gate, machine-DISPROVEN
\* via the stale-first race). The decisive delta is reading the peer's CURRENT generation (a
\* completed round) vs the GOSSIP-tracked one (which races the lock) — the same warm/cold pessimistic
\* report and fresh-ack hold otherwise. HONEST SCOPE: the round's freshness is the MeshAgree-class
\* instantaneous-fresh-ack idealization (reading floorEpoch[o]); a CONCRETE sequence-numbered
\* request/response round discharges it (the implementable design this proof informs), and the
\* machine-disproven AsyncAckSoundEpoch is the concrete PASSIVE attempt that does NOT, so the round
\* is genuinely load-bearing.
\*
\* Expected result: PASS (the SAFETY invariants — no violation). SYMMETRY RelaySymmetry is SOUND for a
\* safety-only check. NOTE: the cold-GOSSIP reorder space is the audit's LARGEST demo (~10^8 distinct
\* states, a multi-ten-minute single-/multi-worker run) — the cold-seed convergence × the async ack
\* matrix × the irreversible-discard record fan out far beyond the warm cfgs. The cheap RED/NEGATIVE
\* demos (which STOP at the first violation) reproduce in ~10-15 s and are the substantive findings;
\* this exhaustive PASS is the supporting positive, with LIVENESS
\* (DoubleFailureRelay_AsyncAckSoundRound_Reorder_Live.cfg, NO symmetry) and NON-VACUITY
\* (DoubleFailureRelay_AsyncAckSoundRound_Reorder_Witness.cfg) checked on tractable companions. Run
\* manually (a demo of the not-yet-landed sound src/ design; budget the runtime). Run:
\*   java -jar .tla-tools/tla2tools.jar -deadlock -config \
\*        specs/tla/DoubleFailureRelay_AsyncAckSoundRound_Reorder.cfg specs/tla/DoubleFailureRelay.tla
CONSTANT SURVIVORS = {a, b, c}
CONSTANT MAX_FRAME = 3
CONSTANT NULL_FRAME = 999
CONSTANT WINDOW = 1
CONSTANT RECEIPTS = {0, 3}
CONSTANT EPOCH_MAX = 1
CONSTANT FIX_MODE = "AsyncAckSoundRound"
CONSTANT COLD_CACHE = FALSE
CONSTANT REORDER = TRUE
SYMMETRY RelaySymmetry

INVARIANT TypeInvariant
INVARIANT NoConfirmedDivergence
INVARIANT LockedRecordMatchesFreeze
INVARIANT FreezeNeverBelowGlobalMin
INVARIANT RecordedSourceInRange
