SPECIFICATION Spec

\* Mesh that exercises the multi-party agreement at N >= 3:
\* 1 coordinator K, 3 survivors {S1, S2, S3}, 1 joiner J, frames 0..MaxFrame.
\* Two survivors is the minimal config that exercises multi-party agreement;
\* three is chosen for N >= 3 coverage (catching any 2-survivor-specific
\* assumption, mirroring NetworkProtocol's N=3 bump). The spec is parameterized
\* over Survivors, so the invariants hold for any non-empty set of survivors
\* and for any valid MaxFrame > 1 (F = L + 1 needs L in 1..MaxFrame-1, so
\* MaxFrame must be at least 2).
CONSTANT Survivors = {S1, S2, S3}
CONSTANT K = K
CONSTANT J = J
CONSTANT MaxFrame = 4
CONSTANT RealVal = 9
CONSTANT NoMode = none
CONSTANT NoVal = 99

\* Pin precondition P-A (Agreement A / clean freeze): all survivors share
\* one frozen value. This is the DEFAULT, must-pass configuration.
\* NPeerReactivation_NoPA.cfg sets AssumePA = FALSE to demonstrate that,
\* WITHOUT P-A, the per-frame committed values can differ (Agreement fails)
\* -- i.e. P-A is necessary.
CONSTANT AssumePA = TRUE

CONSTRAINT StateConstraint

\* Safety invariants to verify (section 5 of the design doc).
INVARIANT TypeInvariant
INVARIANT Agreement
INVARIANT NoConfirmedRewrite
INVARIANT NoSplitBrainOnAbort
INVARIANT SafetyInvariant

\* Liveness under weak fairness: the protocol always resolves to a terminal
\* joined or aborted state (never stalls in "paused").
PROPERTY EventuallyResolved
