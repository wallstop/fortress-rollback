SPECIFICATION Spec

\* Mesh: 1 coordinator K, 2 survivors {S1, S2}, 1 joiner J, frames 0..MaxFrame.
\* Two survivors is the minimal configuration that exercises the multi-party
\* agreement (the commit barrier needs BOTH acks, and the Finding-2 wedge
\* shape needs one wedged + one healthy survivor). The session-33 two-attempt
\* extension multiplies the per-survivor state space (pending/closed/in-flight
\* message state per attempt), so this config scopes to 2 survivors and
\* MaxFrame = 3 (L = 1, F1 = 2, F2 = 3); the pre-extension single-attempt model
\* was checked at 3 survivors / MaxFrame = 4. The spec stays parameterized over
\* Survivors and MaxFrame > 2, so a larger out-of-CI run remains a config-only
\* change (tracked follow-up).
\*
\* Performance (this is a LIVENESS spec -- PROPERTY EventuallyResolved below --
\* and liveness makes TLC record a behavior graph during the BFS, which is far
\* costlier than a safety-only BFS). Measurements: this repo's devcontainer,
\* -Xmx4g.
\* - Single TLC worker, both frozenVal halves explored: 582,112 distinct states,
\*   ~176s locally; on the slower CI runner the same single-worker run blew past
\*   the 30-min step (timed out at >24 min), leaving three later specs unchecked.
\*   (The earlier "fits CI budget" claim here was simply wrong; this config never
\*   fit at a single worker.)
\* - Two independent, sound fixes now keep it well under budget, neither of
\*   which narrows coverage:
\*     1. The frozenVal representative pin in Init (see the spec): under P-A the
\*        all-0 and all-1 frozen-value assignments are isomorphic, so pinning to
\*        0 halves the space to 291,056 distinct states with no loss. SOUND under
\*        liveness (no SYMMETRY, which TLC documents as unsound for liveness).
\*     2. verify-tla.sh runs -workers auto (multi-core) -lncheck final. The BFS
\*        AND the liveness-graph construction parallelize (only the final SCC
\*        pass is single-threaded), the dominant cost here.
\*   Combined: ~22s on 8 cores / ~30s on 4 cores, all invariants + the liveness
\*   property checked exhaustively.
CONSTANT Survivors = {S1, S2}
CONSTANT K = K
CONSTANT J = J
CONSTANT MaxFrame = 3
CONSTANT RealVal = 9
CONSTANT NoMode = none
CONSTANT NoVal = 99

\* Pin precondition P-A (Agreement A / clean freeze): all survivors share
\* one frozen value. This is the DEFAULT, must-pass configuration.
\* NPeerReactivation_NoPA.cfg sets AssumePA = FALSE to demonstrate that,
\* WITHOUT P-A, the per-frame committed values can differ (Agreement fails)
\* -- i.e. P-A is necessary.
CONSTANT AssumePA = TRUE

CONSTRAINT StateConstraint

\* Safety invariants to verify (section 5 of the design doc + the session-33
\* two-attempt / abort-restore extensions).
INVARIANT TypeInvariant
INVARIANT Agreement
INVARIANT NoConfirmedRewrite
INVARIANT NoSplitBrainOnAbort
INVARIANT RealOnlyInCommittedAttempt
INVARIANT NoStaleReopen
INVARIANT SafetyInvariant

\* Liveness under weak fairness: the protocol always resolves to a committed
\* join (either attempt) or the terminal second abort -- including from the
\* lost-JoinAborted wedge, which only the implied close (leg 3) can heal.
PROPERTY EventuallyResolved
