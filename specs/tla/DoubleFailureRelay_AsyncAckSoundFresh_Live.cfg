SPECIFICATION Spec

\* S49 LIVENESS ANCHOR for the COLD-CACHE-SOUND mode (AsyncAckSoundFresh). Checks
\* ConfirmationProgresses (every alive survivor eventually fully-confirms the dropped slot) — i.e.
\* the unreceived-ack HOLD always RESOLVES and never permanently pins confirmation (the Tombstone
\* failure mode). NO SYMMETRY (TLC symmetry is unsound for liveness).
\*
\* Bounds: SURVIVORS = {a, b} / MAX_FRAME = 2, the smallest configuration that completes — the
\* full residual-bound liveness (3 survivors, the relay) is INTRACTABLE (the link-partition freedom
\* 2^(N^2) x the NULL->value ack matrix explodes the liveness tableau past 22M+ distinct even at
\* MAX_FRAME=2). Two survivors still exercises the unreceived-ack hold (each holds for the other's
\* ack), so it confirms the hold resolves; the 3-survivor relay case is covered by the STRUCTURAL
\* argument: the hold blocks only for reachable non-pruned peers with a NULL ack, and WF SendAck
\* (a reachable live peer's ack arrives) + WF Prune (a gone peer leaves the fold) clear every
\* blocker — unlike Tombstone, which structurally retains a dead peer's low term with no fair
\* release action. Verified: No error has been found, 3,601 distinct, ~1s.
CONSTANT SURVIVORS = {a, b}
CONSTANT MAX_FRAME = 2
CONSTANT NULL_FRAME = 999
CONSTANT WINDOW = 1
CONSTANT RECEIPTS = {0, 2}
CONSTANT EPOCH_MAX = 0
CONSTANT FIX_MODE = "AsyncAckSoundFresh"
CONSTANT COLD_CACHE = TRUE

INVARIANT TypeInvariant
INVARIANT NoConfirmedDivergence
INVARIANT LockedRecordMatchesFreeze
INVARIANT FreezeNeverBelowGlobalMin
INVARIANT RecordedSourceInRange

PROPERTY ConfirmationProgresses
