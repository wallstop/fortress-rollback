SPECIFICATION Spec

\* DEMONSTRATION CONFIG (NOT the default; not registered in verify-tla.sh).
\*
\* Differs from NPeerReactivation.cfg in: AssumePA = FALSE (the point of the
\* demonstration -- precondition P-A / Agreement A / clean freeze is NOT
\* pinned, so survivors may hold DIFFERENT independent frozen values); the
\* pre-extension constants (Survivors = {S1, S2, S3}, MaxFrame = 4 -- fine
\* here because the counterexample is found at the INITIAL state, so the
\* extended model's larger reachable space is never explored); and the
\* invariant list (only TypeInvariant + Agreement, keeping the
\* counterexample focused).
\*
\* Expected result: TLC reports a COUNTEREXAMPLE to the Agreement invariant
\* -- survivors hold different independent frozen values, so two of them commit
\* the same frozen frame with different values --
\* proving that P-A is NECESSARY for Agreement C to hold. Run this manually:
\*
\*   java -jar .tla-tools/tla2tools.jar -deadlock \
\*        -config specs/tla/NPeerReactivation_NoPA.cfg \
\*        specs/tla/NPeerReactivation.tla
\*
\* Do NOT add this config to verify-tla.sh; it is meant to FAIL.
CONSTANT Survivors = {S1, S2, S3}
CONSTANT K = K
CONSTANT J = J
CONSTANT MaxFrame = 4
CONSTANT RealVal = 9
CONSTANT NoMode = none
CONSTANT NoVal = 99

\* P-A deliberately NOT pinned here: AssumePA = FALSE lets survivors hold
\* different independent frozen values, so Agreement must fail.
CONSTANT AssumePA = FALSE

CONSTRAINT StateConstraint

\* Only the Agreement invariant matters for the demonstration; checking it
\* alone keeps the counterexample focused.
INVARIANT TypeInvariant
INVARIANT Agreement
