SPECIFICATION Spec

\* N=3 survivors: the cross-survivor freeze-value convergence is an N>=3
\* concern (two survivors can disagree, three exercise the staggered-gossip
\* mesh). SURVIVORS is genuinely parameterized, so this is a true scope.
\*
\* Bounds rationale (this repo's devcontainer, single TLC worker as
\* verify-tla.sh / CI runs it):
\* - MAX_FRAME = 3 is the smallest bound that makes a staggered drop
\*   observable: survivors can receive the dropped peer through frames
\*   spread across {0,1,2,3} so the global min sits strictly below some
\*   survivors' local freeze frame, forcing a non-trivial ConvergeDown.
\* - InputValue is hardcoded to {0,1} in the .tla: two distinct values are
\*   enough to make a divergent (label-only, value-not-rolled) freeze
\*   observable -- the non-vacuity sabotage relies on exactly this.
\* - No SYMMETRY: a liveness property (EventuallyConverged) is checked, and
\*   TLC symmetry reduction is unsound for liveness. The model is small
\*   enough (a few hundred thousand distinct states) to run un-reduced.
\* - streamValue and receivedThrough are fixed-at-Init adversarial choices
\*   (the dropped peer's per-frame inputs and each survivor's asymmetric
\*   high-water received frame); they never change, so they enlarge only
\*   the initial-state set, not the reachable depth.
CONSTANT SURVIVORS = {s1, s2, s3}
CONSTANT MAX_FRAME = 3
CONSTANT NULL_FRAME = 999

\* Safety invariants
INVARIANT TypeInvariant
INVARIANT FrozenValueFaithful
INVARIANT FreezeFrameInRange
INVARIANT ConvergedNoDesync

\* Liveness: every survivor eventually converges to the agreed global min,
\* so the mesh reaches the no-desync fixpoint (requires the WF assumptions
\* in Spec).
PROPERTY EventuallyConverged
