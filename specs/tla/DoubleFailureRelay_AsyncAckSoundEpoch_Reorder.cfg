SPECIFICATION Spec

\* S52 MID-GAME-DROP-REORDER NEGATIVE — the cheap, tempting PASSIVE-EPOCH fix, MACHINE-DISPROVEN.
\* AsyncAckSoundEpoch is the pessimistic-report + fresh-ack-hold mode PLUS a PASSIVE floor-epoch
\* freshness gate: (1) the ack-cache OVERWRITE rejects a packet whose floorEpoch is below the cached
\* ack's epoch (the S46 `ConnectionStatus.epoch` gate on the `peer_pessimistic_floor` overwrite in
\* `merge_peer_connect_status`), and (2) the advance HOLDS while a cached ack's epoch is below the
\* GOSSIP-tracked latest floorEpoch (cacheEpoch). This is the literal reading of the audit's
\* "epoch as a freshness gate on the cache overwrite" prescription.
\*
\* It is UNSOUND via the STALE-FIRST race: a stale-HIGH ack delivered BEFORE any fresh ack — and
\* before the floorEpoch-bump GOSSIP arrives to raise cacheEpoch — passes BOTH gates (the cached
\* epoch and the gossip epoch are both still 0), so the observer locks on the stale high. This is the
\* S47 "epoch-bump gossip RACES the observer's lock" obstruction recurring at the reorder level: a
\* PASSIVE epoch comparison is not enough EVEN with the pessimistic report. The POSITIVE
\* DoubleFailureRelay_AsyncAckSoundRound_Reorder.cfg (a fresh-ack ROUND reading the peer's CURRENT
\* generation, not the racing gossip cache) PASSES — isolating the round, not the passive gate, as
\* the load-bearing fix.
\*
\* Expected result: FAIL (LockedRecordMatchesFreeze violated — the residual reproduces via the
\* stale-first race). NOT registered in verify-tla.sh (a demo expected to FAIL; the second of the
\* two S52 reorder negatives, the analog of the S47 AsyncAckGossip negative). Run manually:
\*   java -jar .tla-tools/tla2tools.jar -deadlock -config \
\*        specs/tla/DoubleFailureRelay_AsyncAckSoundEpoch_Reorder.cfg specs/tla/DoubleFailureRelay.tla
