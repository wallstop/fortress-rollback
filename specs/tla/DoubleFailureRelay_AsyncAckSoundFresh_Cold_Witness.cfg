SPECIFICATION Spec

\* S49 NON-VACUITY DEMONSTRATION for the COLD-CACHE-SOUND mode (NOT the default; not CI-registered).
\* Identical constants to DoubleFailureRelay_AsyncAckSoundFresh_Cold.cfg (the AsyncAckSoundFresh cold
\* SAFETY PASS) but it checks the two NON-VACUITY WITNESS invariants instead of the safety properties.
\*
\* Each witness is the NEGATION of "the interesting state is reachable", so TLC reporting it VIOLATED
\* proves the headline safety invariants' hypotheses ARE reached under AsyncAckSoundFresh cold — i.e.
\* the PASS is NOT vacuous. This is necessary because the fresh-mode unreceived-ack HOLD blocks
\* confirmation MORE aggressively than the warm AsyncAckSound, so it must be shown independently that
\* frames still LOCK and the slot still MESH-AGREES (so safety is not vacuously true because nothing
\* is ever confirmed/discarded). Both witnesses were VERIFIED reachable (VIOLATED).
\*
\* Expected result: TLC reports a COUNTEREXAMPLE to a witness (run them one at a time — TLC stops at
\* the first violated invariant; comment out the first to see the second). SYMMETRY RelaySymmetry is
\* SOUND for invariant (reachability) checking. Run manually:
\*   java -jar .tla-tools/tla2tools.jar -deadlock -config \
\*        specs/tla/DoubleFailureRelay_AsyncAckSoundFresh_Cold_Witness.cfg specs/tla/DoubleFailureRelay.tla
CONSTANT SURVIVORS = {a, b, c}
CONSTANT MAX_FRAME = 3
CONSTANT NULL_FRAME = 999
CONSTANT WINDOW = 1
CONSTANT RECEIPTS = {0, 3}
CONSTANT EPOCH_MAX = 0
CONSTANT FIX_MODE = "AsyncAckSoundFresh"
CONSTANT COLD_CACHE = TRUE
SYMMETRY RelaySymmetry

INVARIANT WitnessTwoSurvivorsLockSameFrame
INVARIANT WitnessMeshAgreedWithLockedNonDegenerate
