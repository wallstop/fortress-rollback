SPECIFICATION FairSpec

CONSTANT PEERS = {p1, p2}
CONSTANT PLAYER_COUNTS = {2, 3}
CONSTANT INPUT_WIDTHS = {4, 32}
CONSTANT NUM_SYNC_PACKETS = 3
CONSTANT TIMEOUT_TICKS = 1
CONSTANT MAX_NETWORK = 2
CONSTANT DELIVERY_MODE = "FairDelivery"
CONSTANT CONFIG_MODE = "Matching"
CONSTANT NO_CONFIG = NoConfig
CONSTANT NO_PEER = NoPeer
CONSTANT NO_VALUE = NoValue

INVARIANT TypeInvariant
INVARIANT LearnedConfigAuthentic
INVARIANT SyncedOnlyWithMatchingConfig
INVARIANT AcceptedTokensExact
INVARIANT IncompatibleEventExactlyOnce
INVARIANT IncompatibleReasonOriented
INVARIANT ObservedMismatchFailsAndReports

PROPERTY EventuallyBothSynced
PROPERTY FailureIsSticky
PROPERTY TimeoutTransitionIsEventOnly
