SPECIFICATION Spec

\* S52 MID-GAME-DROP-REORDER NEGATIVE — the cold-cache-sound mode AsyncAckSoundFresh, stripped of
\* the floor-epoch gate, REOPENS the residual under reorder. This is the model-level RED that
\* mirrors the would-be in-process reorder repro: it isolates the floor-epoch overwrite gate as the
\* load-bearing fix by running the SAME pessimistic-report + fresh-ack-hold mode that PASSES in the
\* warm/cold-ack scopes, now in the COLD-GOSSIP-cache / reorder world (REORDER = TRUE).
\*
\* Mechanism: REORDER (1) cold-seeds the gossip cache so a relay's PESSIMISTIC floor goes
\* HIGH-then-LOW mid-game (high while its cache of the low origin is cold, low once the origin's
\* disconnect-gossip lands), and (2) enables StaleAck, which re-delivers the relay's earlier HIGH
\* floor snapshot (an OLD floor-epoch) AFTER a fresh LOW one. AsyncAckSoundFresh's ack cache is a
\* PLAIN OVERWRITE (no floor-epoch gate), so the stale-HIGH clobbers the fresh-LOW: the victim,
\* having pruned the dead origin, folds only the relay's now-stale-HIGH ack, confirms+discards the
\* dropped slot's real inputs above the eventual freeze, and diverges from the relay (which froze
\* low). The converged INPUTS still match, so the input-checksum detector stays silent.
\*
\* Expected result: FAIL (LockedRecordMatchesFreeze / NoConfirmedDivergence violated) — the residual
\* reproduces. The fix DoubleFailureRelay_AsyncAckSoundEpoch_Reorder.cfg (same constants, the
\* floor-epoch gate) PASSES. NOT registered in verify-tla.sh (a demo expected to FAIL). Run manually:
\*   java -jar .tla-tools/tla2tools.jar -deadlock -config \
\*        specs/tla/DoubleFailureRelay_AsyncAckSoundFresh_Reorder.cfg specs/tla/DoubleFailureRelay.tla
CONSTANT SURVIVORS = {a, b, c}
CONSTANT MAX_FRAME = 3
CONSTANT NULL_FRAME = 999
CONSTANT WINDOW = 1
CONSTANT RECEIPTS = {0, 3}
CONSTANT EPOCH_MAX = 1
CONSTANT FIX_MODE = "AsyncAckSoundFresh"
CONSTANT COLD_CACHE = FALSE
CONSTANT REORDER = TRUE
SYMMETRY RelaySymmetry

INVARIANT TypeInvariant
INVARIANT NoConfirmedDivergence
INVARIANT LockedRecordMatchesFreeze
INVARIANT FreezeNeverBelowGlobalMin
INVARIANT RecordedSourceInRange
