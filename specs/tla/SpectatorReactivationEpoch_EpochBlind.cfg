SPECIFICATION Spec

\* DEMONSTRATION CONFIG (NOT the default; NOT registered in verify-tla.sh).
\*
\* Differs from SpectatorReactivationEpoch.cfg in: FIX_MODE = "EpochBlind"
\* (the pre-Session-46 freeze-ONLY witness — no high-water stale-reject in
\* witness_host_status_reports, no `incoming_epoch >= witness.epoch` clause in
\* reactivation_provenance). The point of the demonstration is that the
\* resurrection-safety invariant NoFalseResurrection is NOT pinned without the
\* epoch: TLC reports a COUNTEREXAMPLE reproducing a host->spectator FALSE
\* resurrection — a reordered PRE-drop connected snapshot (the WITHIN-CYCLE
\* fail-open) FOLLOWS a connected report and drives the latch CONNECTED while a
\* host still observes a strictly newer drop the spectator already committed past.
\* This is the model-level RED that mirrors the in-process repro
\* within_cycle_pre_drop_epoch_blocks_follow_post_drop_epoch_follows in
\* src/sessions/p2p_spectator_session.rs. (The sibling CROSS-CYCLE fail-open and
\* its high-water stale-reject — production test
\* cross_cycle_stale_drop_epoch_blocks_resurrect_after_consume — need host
\* failover to reach the full resurrection and are out of scope here; see the
\* spec SCOPE header.)
\*
\* Expected result: TLC reports "Invariant NoFalseResurrection is violated"
\* with a trace. Run this manually:
\*
\*   java -jar .tla-tools/tla2tools.jar -deadlock \
\*        -config specs/tla/SpectatorReactivationEpoch_EpochBlind.cfg \
\*        specs/tla/SpectatorReactivationEpoch.tla
\*
\* Do NOT add this config to verify-tla.sh; it is MEANT to FAIL (on the safety
\* invariant) — it proves the residual is real and the epoch gate is load-bearing.
CONSTANT HOSTS = {1, 2}
CONSTANT MAX_FRAME = 2
CONSTANT NULL_FRAME = 999
CONSTANT MAXGEN = 3
CONSTANT FIX_MODE = "EpochBlind"

CONSTRAINT StateConstraint

\* Only the safety invariants — the counterexample is a safety violation.
INVARIANT TypeInvariant
INVARIANT NoFalseResurrection
INVARIANT LatchAtOrBelowLiveMin
INVARIANT GateAcceptsBoundaryWitness
INVARIANT SafetyInvariant
