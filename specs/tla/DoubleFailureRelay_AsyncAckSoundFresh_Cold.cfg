SPECIFICATION Spec

\* S49 COLD POSITIVE (SAFETY) — the COLD-CACHE-SOUND implementable mode. AsyncAckSoundFresh pairs
\* the PESSIMISTIC queue-min report (PessimisticReport — surfaces a departed origin's low the relay
\* still folds) with a FRESH-ACK-ROUND HOLD that does NOT trust the cold seed: ackFloor is
\* NULL-seeded and confirmation HOLDS for any folded reachable peer whose ack has not yet been
\* delivered. It is the single-MECHANISM delta from AsyncAckSound (NULL-seed + the unreceived-ack
\* hold), which flips the cold residual FAIL (DoubleFailureRelay_AsyncAckSound_Cold.cfg) -> PASS.
\* Once the relay's fresh pessimistic ack lands it carries the dead origin's low, pinning the
\* observer at the global min — so the cold corner is closed by the OBSERVER-side fresh-ack ROUND
\* (do not trust the cold cache), NOT a sender-side drop-epoch / two-phase commitment.
\*
\* Expected result: PASS (the SAFETY invariants). Verified: No error has been found —
\* 75,184,232 generated / **13,053,924 distinct**, ~3m46s.
\*
\* SYMMETRY: this is a SAFETY-ONLY check, so SYMMETRY Permutations(SURVIVORS) (via RelaySymmetry)
\* is SOUND and makes the large state space tractable — TLC symmetry is unsound only for LIVENESS;
\* MinI's CHOOSE ranges over integer frames only (no CHOOSE over SURVIVORS), so it is
\* symmetry-safe, and Init/Next draw every survivor from identical domains (a true automorphism).
\* The non-symmetric state space is 39M+ (intractable). LIVENESS is checked separately —
\* DoubleFailureRelay_AsyncAckSoundFresh_Live.cfg (NO symmetry; small tractable bounds) + a
\* structural argument (the unreceived-ack hold is bounded by WF SendAck/Prune over reachable
\* folded peers — no Tombstone-style structural pin). NON-VACUITY by
\* DoubleFailureRelay_AsyncAckSoundFresh_Cold_Witness.cfg. Run manually (not CI-registered, runtime).
\* HONEST SCOPE: this model colds the ACK seed while the gossip CACHE stays warm (the relay always
\* folds the origin's low — the faithful drop-at-Init convention), so one received pessimistic ack
\* suffices; a cold-GOSSIP-cache / mid-game-drop world needs the S46 epoch as a freshness gate too.
CONSTANT SURVIVORS = {a, b, c}
CONSTANT MAX_FRAME = 3
CONSTANT NULL_FRAME = 999
CONSTANT WINDOW = 1
CONSTANT RECEIPTS = {0, 3}
CONSTANT EPOCH_MAX = 0
CONSTANT FIX_MODE = "AsyncAckSoundFresh"
CONSTANT COLD_CACHE = TRUE
CONSTANT REORDER = FALSE
SYMMETRY RelaySymmetry

INVARIANT TypeInvariant
INVARIANT NoConfirmedDivergence
INVARIANT LockedRecordMatchesFreeze
INVARIANT FreezeNeverBelowGlobalMin
INVARIANT RecordedSourceInRange
