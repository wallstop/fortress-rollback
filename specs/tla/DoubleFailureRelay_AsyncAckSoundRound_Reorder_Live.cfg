SPECIFICATION Spec

\* S52 LIVENESS ANCHOR for the reorder-SOUND mode AsyncAckSoundRound. Checks ConfirmationProgresses
\* (every alive survivor eventually fully-confirms the dropped slot) — i.e. the fresh-ack-ROUND HOLD
\* always RESOLVES and never permanently pins confirmation (the Tombstone failure mode). NO SYMMETRY
\* (TLC symmetry is unsound for liveness).
\*
\* Bounds: SURVIVORS = {a, b} / MAX_FRAME = 2, the smallest configuration that completes — the full
\* reorder liveness (3 survivors, the relay, the cold-gossip ack matrix) is intractable. Two
\* survivors still exercises the round HOLD (each holds for the other's current-generation ack), so it
\* confirms the hold resolves; the 3-survivor relay case is covered by the STRUCTURAL argument: the
\* round-hold blocks only for a reachable non-pruned peer whose ack epoch is below that peer's current
\* floorEpoch, and WF SendAck (a current-generation ack arrives) + WF Prune (a gone peer leaves the
\* fold) + the boundedness of floorEpoch (it bumps only on a floor-lowering, finitely) clear every
\* blocker — unlike Tombstone, which structurally retains a dead peer's low term with no fair release.
CONSTANT SURVIVORS = {a, b}
CONSTANT MAX_FRAME = 2
CONSTANT NULL_FRAME = 999
CONSTANT WINDOW = 1
CONSTANT RECEIPTS = {0, 2}
CONSTANT EPOCH_MAX = 1
CONSTANT FIX_MODE = "AsyncAckSoundRound"
CONSTANT COLD_CACHE = FALSE
CONSTANT REORDER = TRUE

INVARIANT TypeInvariant
INVARIANT NoConfirmedDivergence
INVARIANT LockedRecordMatchesFreeze
INVARIANT FreezeNeverBelowGlobalMin
INVARIANT RecordedSourceInRange

PROPERTY ConfirmationProgresses
