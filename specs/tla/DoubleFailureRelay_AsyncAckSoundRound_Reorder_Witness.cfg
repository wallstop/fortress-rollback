SPECIFICATION Spec

\* S52 NON-VACUITY DEMONSTRATION for the reorder-SOUND mode AsyncAckSoundRound (NOT the default; not
\* CI-registered). Identical constants to DoubleFailureRelay_AsyncAckSoundRound_Reorder.cfg (the
\* reorder SAFETY PASS) but it checks the two NON-VACUITY WITNESS invariants instead of the safety
\* properties.
\*
\* Each witness is the NEGATION of "the interesting state is reachable", so TLC reporting it VIOLATED
\* proves the headline safety invariants' hypotheses ARE reached under AsyncAckSoundRound in the
\* reorder world — i.e. the PASS is NOT vacuous. This matters because the fresh-ack ROUND blocks
\* confirmation more aggressively than the unsound passive-epoch attempts, so it must be shown
\* independently that frames still LOCK and the slot still MESH-AGREES (so safety is not vacuously
\* true because nothing is ever confirmed/discarded). Both witnesses are reachable (VIOLATED).
\*
\* Expected result: TLC reports a COUNTEREXAMPLE to a witness (run them one at a time — TLC stops at
\* the first violated invariant; comment out the first to see the second). SYMMETRY RelaySymmetry is
\* SOUND for invariant (reachability) checking. Run manually:
\*   java -jar .tla-tools/tla2tools.jar -deadlock -config \
\*        specs/tla/DoubleFailureRelay_AsyncAckSoundRound_Reorder_Witness.cfg specs/tla/DoubleFailureRelay.tla
CONSTANT SURVIVORS = {a, b, c}
CONSTANT MAX_FRAME = 3
CONSTANT NULL_FRAME = 999
CONSTANT WINDOW = 1
CONSTANT RECEIPTS = {0, 3}
CONSTANT EPOCH_MAX = 1
CONSTANT FIX_MODE = "AsyncAckSoundRound"
CONSTANT COLD_CACHE = FALSE
CONSTANT REORDER = TRUE
SYMMETRY RelaySymmetry

INVARIANT WitnessTwoSurvivorsLockSameFrame
INVARIANT WitnessMeshAgreedWithLockedNonDegenerate
