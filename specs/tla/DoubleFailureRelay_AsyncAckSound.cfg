SPECIFICATION Spec

\* The CERTIFIED-SOUND implementable mode (Session 48) — the POSITIVE culmination of the
\* S47 async ladder. It discharges BOTH MeshAgree idealizations (in-flight ack round +
\* per-observer async death) AND passes safety AND liveness, so — unlike MeshAgree (the
\* idealized POLICY positive) — it is a directly implementable design for the src/ fix.
\*
\* FIX_MODE = "AsyncAckSound" is the disproven AsyncAckStale machinery with a SINGLE delta:
\* the relay reports its PESSIMISTIC queue-min (the min over its own floor AND every folded
\* source's cached last_frame) instead of its own floor. That surfaces a DEPARTED origin's
\* low the instant it is in the relay's fold — closing the departed-low race that killed
\* AsyncAckTwoPhase and the gossip race that killed AsyncAckGossip (both reported the
\* non-pessimistic own floor). A pessimistic ack can never be stale-HIGH (it only rises when
\* the source prunes a departed origin, after which the source also freezes/confirms high),
\* so the in-flight snapshot is a sound lower bound and NO epoch freshness gate or two-phase
\* commitment is needed. The fresh-ack round is modeled by reachability-gating the advance
\* (the round must complete) + WF SendAck (acks refresh); there is NO partition-hold (the
\* observer itself holds when it cannot reach a folded peer — the S47 link-heal race proved a
\* partition-hold unsound).
\*
\* Expected result: PASS — both the safety invariants AND the liveness property hold. This is
\* the design a production red-green cycle should implement (S47 blueprint: pessimistic
\* queue-min report + fresh-ack round + no partition-hold, on the S46 connect-status gossip).
\* Registered in verify-tla.sh.
\*
\* EPOCH_MAX = 0: AsyncAckSound uses NO epoch freshness gate (its soundness comes from the
\* pessimistic report applied from warmup, not the epoch — the load-bearing refinement of S47,
\* whose ladder used non-pessimistic reports), so the vestigial per-slot epoch machinery is
\* pinned. The epoch dimension is exercised by the _AsyncAckGossip / _AsyncAckTwoPhase demo cfgs.
\* ISOLATION NOTE (apples-to-apples): the own-floor control _AsyncAckStale.cfg is registered at
\* EPOCH_MAX=2, but it ALSO FAILS at EPOCH_MAX=0 (the exact bound where AsyncAckSound PASSES) —
\* so the pessimistic REPORT, not the epoch bound, is the variable that flips FAIL->PASS.
\* LOAD-BEARING SEED NOTE: the soundness additionally relies on the warm-cache `GlobalMin`
\* ackFloor seed (Init) — every observer holds a pessimistic ack <= GlobalMin before any drop;
\* reverting that seed to the own-receipt value reproduces the residual (mutation-pinned).
\* The other bounds match DoubleFailureRelay.cfg (MeshAgree) — see that file for the
\* SURVIVORS / MAX_FRAME / WINDOW / RECEIPTS rationale (3 survivors, the minimum that exhibits
\* the relay residual; MAX_FRAME=3 / WINDOW=1, the smallest pair making an irreversibly
\* discarded contested frame reachable; RECEIPTS={0,3}, the low/high asymmetry).
CONSTANT SURVIVORS = {a, b, c}
CONSTANT MAX_FRAME = 3
CONSTANT NULL_FRAME = 999
CONSTANT WINDOW = 1
CONSTANT RECEIPTS = {0, 3}
CONSTANT EPOCH_MAX = 0
CONSTANT FIX_MODE = "AsyncAckSound"

\* Safety invariants
INVARIANT TypeInvariant
INVARIANT NoConfirmedDivergence
INVARIANT LockedRecordMatchesFreeze
INVARIANT FreezeNeverBelowGlobalMin
INVARIANT RecordedSourceInRange

\* Liveness: every alive survivor eventually reaches a stable fully-confirmed fixpoint for
\* the dropped slot (requires the WF assumptions in Spec). PASSES (unlike Tombstone).
PROPERTY ConfirmationProgresses

\* S49: warm-cache convention (the established DoubleFailureRelay scope) — unchanged.
CONSTANT COLD_CACHE = FALSE
CONSTANT REORDER = FALSE
