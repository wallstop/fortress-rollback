\* Fair, fault-free, non-vacuous two-operation companion.
SPECIFICATION FairSpec

CONSTANT PEERS = {p0, p1}
CONSTANT COORD = p0
CONSTANT MAX_FRAME = 1
CONSTANT INPUTS = {v0, v1}
CONSTANT MAX_BACKFILL = 1
CONSTANT MAX_GENERATION = 1
CONSTANT MAX_NETWORK = 2
CONSTANT MAX_TICKS = 1
CONSTANT FIX_MODE = "Barrier"
CONSTANT DELIVERY_MODE = "FairDelivery"
CONSTANT INIT_MODE = "ReceiptWitness"
CONSTANT NO_OP = 99
CONSTANT NO_FRAME = 99
CONSTANT NO_VALUE = NoValue

INVARIANT SafetyInvariant
PROPERTY EventuallyResolvedTwoOps
PROPERTY EventuallyBackfilled
PROPERTY EventuallyReceiptRaisesCut
PROPERTY EventuallyMembershipEraRebased
PROPERTY EventuallyStaleIgnored
PROPERTY EventuallyDuplicateHandled
