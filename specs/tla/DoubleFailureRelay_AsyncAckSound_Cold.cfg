SPECIFICATION Spec

\* S49 COLD NEGATIVE — the pessimistic report ALONE, stripped of the warm-GlobalMin seed.
\* Identical to DoubleFailureRelay_AsyncAckSound.cfg EXCEPT COLD_CACHE = TRUE, which seeds
\* ackFloor at the own-receipt-HIGH value instead of GlobalMin (no warmup pessimistic ack
\* delivered). S48 proved AsyncAckSound sound only in the WARM scope; this config exhibits the
\* cold corner directly: the pessimistic report closes the departed-low race, but WITHOUT the
\* warm seed nothing closes the STALE-IN-FLIGHT facet of idealization (a) — a victim advances
\* on a stale-high cold ack from a reachable relay before a fresh pessimistic ack arrives.
\*
\* Expected result: FAIL (LockedRecordMatchesFreeze / NoConfirmedDivergence violated) — the
\* residual reproduces. This makes S48's seed-revert mutation a permanent, first-class artifact
\* and scopes the cold corner. NOT registered in verify-tla.sh (a demo expected to FAIL).
CONSTANT SURVIVORS = {a, b, c}
CONSTANT MAX_FRAME = 3
CONSTANT NULL_FRAME = 999
CONSTANT WINDOW = 1
CONSTANT RECEIPTS = {0, 3}
CONSTANT EPOCH_MAX = 0
CONSTANT FIX_MODE = "AsyncAckSound"
CONSTANT COLD_CACHE = TRUE

INVARIANT TypeInvariant
INVARIANT NoConfirmedDivergence
INVARIANT LockedRecordMatchesFreeze
INVARIANT FreezeNeverBelowGlobalMin
INVARIANT RecordedSourceInRange
