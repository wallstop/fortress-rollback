SPECIFICATION Spec

\* N=3: the spec was re-modeled (per-(local,remote) PAIR verdict keying,
\* [PEERS -> [PEERS \ {p} -> ...]]) to faithfully match the implementation's
\* per-UdpProtocol pending_checksums / last_verified_frame (the F12 fix in
\* src/sessions/p2p_session.rs), so the Session 27 N=3 blocker (per-local
\* verdicts clobbered across remotes, violating DesyncIsTerminal) no longer
\* applies. Three peers exercise cross-pair independence: a verdict for
\* (p,q) must survive traffic and matches in (p,r).
\*
\* Bounds rationale (wall-clock measurements below: this repo's devcontainer,
\* single TLC worker, -Xmx4g). State COUNTS are worker-independent and exact;
\* the wall times are the single-worker figures the bounds were chosen against.
\* verify-tla.sh / CI now run -workers auto, so the wall times are lower in
\* practice (this config completes in ~49s on 8 cores), but the counts and the
\* tractability argument are unchanged:
\* - MAX_FRAME = 3 with CHECKSUM_INTERVAL = 1 is the SMALLEST model with
\*   two comparable checksum frames per pair: sends happen at frames 1, 2,
\*   3, and frames 1 AND 2 satisfy frame < lastConfirmedFrame <= 3. That
\*   keeps multi-frame per-pair behavior (monotonic lastVerifiedFrame
\*   1 -> 2 bumps, latched desync followed by a stale pre-divergence match
\*   arriving late) reachable, not vacuous -- re-proven by scratch probe
\*   invariants at exactly this configuration.
\* - These bounds alone are NOT tractable at N=3. Measured: with the old
\*   Cardinality(network) <= 4 constraint and no symmetry, TLC was killed
\*   after 28.6 min at 233M+ generated / 31.7M+ distinct states (depth 38,
\*   queue still growing). Adding SYMMETRY alone was still insufficient
\*   (killed at 12 min: 79.2M generated / 10.3M distinct, queue growing).
\* - SYMMETRY Symm (Permutations(PEERS)): sound here because the only
\*   CHOOSE in the module ranges over Int frame numbers (never over peers)
\*   and liveness checking is disabled; see the Symm comment in the .tla.
\* - StateConstraint caps in-flight (sent-not-yet-received) messages at 2,
\*   i.e. one N=3 broadcast outstanding at a time. This is a sound
\*   reduction: ReceiveChecksum only moves a message's payload into
\*   pendingChecksums and commutes with every other action (including
\*   Done, whose network = {} guard receives can only enable sooner), so
\*   any unconstrained trace reorders (receive-early) into a constrained
\*   trace with the same Send/Compare/IntroduceDesync transitions and the
\*   same values of every variable the checked properties read at each
\*   (pendingChecksums differs only by EARLIER delivery of identically
\*   valued, written-once entries) -- see the full argument at
\*   StateConstraint in the .tla. pendingChecksums (post-delivery state)
\*   is NOT capped, so cross-pair comparison interleavings -- where the
\*   Session 27 bug class lives -- are intact.
\* - Final configuration (symmetry + cap 2) completes: 11,674,741 states
\*   generated / 1,469,194 distinct, depth 62, ~106s wall (single worker).
CONSTANT PEERS = {p1, p2, p3}
CONSTANT MAX_FRAME = 3
CONSTANT CHECKSUM_INTERVAL = 1

SYMMETRY Symm

CONSTRAINT StateConstraint

\* Safety invariants to check
INVARIANT TypeInvariant
INVARIANT NoFalsePositives
INVARIANT InSyncImpliesMatchingChecksums
INVARIANT SynchronizedRequiresAllPairsVerified
INVARIANT AggregateVerifiedFrameSound

\* Temporal properties (safety as temporal)
PROPERTY DesyncIsTerminal
PROPERTY VerifiedFrameMonotonic

\* Liveness properties (require fairness; premises are unsound as stated --
\* a later IntroduceDesync / late divergence invalidates them -- so they
\* stay disabled, as in the previous N=2 model)
\* PROPERTY EventuallyInSync
\* PROPERTY EventuallyDetected
