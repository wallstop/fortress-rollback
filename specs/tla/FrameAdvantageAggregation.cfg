SPECIFICATION Spec

\* NUM_ENDPOINTS = 3 models the local peer's view of an N>=4-player mesh (three
\* REMOTE endpoints). This is the cross-peer aggregation TimeSync.tla cannot
\* reach with a constant bump (Session 27): here a 3rd+ endpoint adds genuine
\* coverage (the max fold, the multi-handle idempotence, the exclusion + fallback).
CONSTANT NUM_ENDPOINTS = 3

\* MAX_ADVANTAGE must be >= MIN_RECOMMENDATION so the RecommendWait action is
\* reachable (otherwise the aggregate could never cross the threshold and
\* RecommendationPositive would be vacuous). Small enough for fast exhaustive
\* checking; the proven properties hold for any bound (production: i32).
CONSTANT MAX_ADVANTAGE = 4

\* The one couch-co-op endpoint (endpoint 1) owns 2 handles, so the per-handle
\* fold runs twice for it -- the non-vacuous case for MultiHandleIdempotent.
CONSTANT MULTI_HANDLE_COUNT = 2

\* Faithful to production const MIN_RECOMMENDATION = 3.
CONSTANT MIN_RECOMMENDATION = 3

\* Outside [MIN_RECOMMENDATION, MAX_ADVANTAGE] = [3, 4], so it is unambiguously
\* "no recommendation" (positive sentinel per repo convention; the .cfg parser
\* rejects negative literals).
CONSTANT NULL_REC = 999

\* No SYMMETRY: endpoints are NOT interchangeable (endpoint 1 is the multi-handle
\* one), and the model is small enough (~tens of thousands of states) to run
\* un-reduced.

INVARIANT TypeInvariant
INVARIANT FoldMatchesMaxSemantic
INVARIANT MultiHandleIdempotent
INVARIANT AggregateIsAContributorOrZero
INVARIANT FallbackZero
INVARIANT AggregateBounded
INVARIANT RecommendationPositive
