SPECIFICATION Spec

\* NON-VACUITY DEMONSTRATION CONFIG for the SOUND implementable mode (Session 48; NOT the
\* default, not registered in verify-tla.sh). Identical constants to
\* DoubleFailureRelay_AsyncAckSound.cfg (the AsyncAckSound PASS), but it checks the two
\* NON-VACUITY WITNESS invariants instead of the safety/liveness properties.
\*
\* Each witness is the NEGATION of "the interesting state is reachable", so TLC reporting it
\* VIOLATED proves the headline safety invariants' hypotheses are actually reached UNDER THE
\* AsyncAckSound CONFIG — i.e. the AsyncAckSound PASS is NOT vacuous. This is necessary
\* SEPARATELY from the MeshAgree witness (DoubleFailureRelay_Witness.cfg): AsyncAckSound's
\* pessimistic-report confirmation rule HOLDS confirmation more aggressively than MeshAgree,
\* so it must be independently shown that frames still LOCK and the slot still MESH-AGREES
\* (so safety is not vacuously true because nothing is ever confirmed/discarded).
\*
\* Expected result: TLC reports a COUNTEREXAMPLE to BOTH witnesses (run them one at a time —
\* TLC stops at the first violated invariant; comment out the first to see the second). Run
\* manually:
\*
\*   java -jar .tla-tools/tla2tools.jar -deadlock \
\*        -config specs/tla/DoubleFailureRelay_AsyncAckSound_Witness.cfg \
\*        specs/tla/DoubleFailureRelay.tla
\*
\* Do NOT add this config to verify-tla.sh; it is meant to FAIL (each witness is a
\* reachability assertion expressed as a violated invariant).
CONSTANT SURVIVORS = {a, b, c}
CONSTANT MAX_FRAME = 3
CONSTANT NULL_FRAME = 999
CONSTANT WINDOW = 1
CONSTANT RECEIPTS = {0, 3}
CONSTANT EPOCH_MAX = 0
CONSTANT FIX_MODE = "AsyncAckSound"

INVARIANT WitnessTwoSurvivorsLockSameFrame
INVARIANT WitnessMeshAgreedWithLockedNonDegenerate
