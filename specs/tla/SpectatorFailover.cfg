SPECIFICATION Spec

\* Multi-host spectator failover is an N>=2-hosts concern; 3 redundant hosts
\* exercise the interesting case the gate defends: canonical OSCILLATION, where
\* the host that witnessed the drop fails over and a DIFFERENT survivor (which
\* may never have seen the drop) becomes canonical. HOSTS are numbered so the
\* canonical = the lowest-numbered live host (Min(live)), matching the
\* production first-non-pending-host selection.
\*
\* Bounds rationale (this repo's devcontainer, single TLC worker as
\* verify-tla.sh / CI runs it):
\* - MAX_FRAME = 3 -> drop freeze frames are {1,2,3}. Two distinct values are
\*   the minimum that makes converge-DOWN observable (a host frozen at 2 must
\*   converge to a peer's 1); three exercise MULTI-WAY convergence (a host at 3
\*   folding through to a peer's 1 across redundant hosts) -- the N>=3 redundancy
\*   the feature exists for. ~97k distinct states, ~6s single-worker; the
\*   non-vacuity sabotages and reachability probes (see the progress write-up)
\*   all hold at this bound.
\* - NULL_FRAME = 999 is the "no witness" / initial sentinel, outside 0..MAX_FRAME.
\* - hostFreeze is an adversarial fixed-at-Init per-host choice (each host's
\*   asymmetric high-water received frame); it never changes, so it enlarges
\*   only the initial-state set, not the reachable depth.
\* - No SYMMETRY: (a) canonical = Min(live) makes the host index privileged
\*   (no permutation symmetry), and (b) a liveness property is checked and TLC
\*   symmetry reduction is unsound for liveness.
CONSTANT HOSTS = {1, 2, 3}
CONSTANT MAX_FRAME = 3
CONSTANT NULL_FRAME = 999

CONSTRAINT StateConstraint

\* Safety invariants
INVARIANT TypeInvariant
INVARIANT LatchAtOrBelowLiveMin
INVARIANT NoFalseResurrection
INVARIANT GateAcceptsBoundaryWitness
INVARIANT SafetyInvariant

\* Action property: a disconnected slot's freeze frame is never raised.
PROPERTY FreezeNeverRaised

\* Liveness: a real drop is eventually reflected in the latch (requires the WF
\* assumptions in Spec).
PROPERTY DropEventuallyLatched
