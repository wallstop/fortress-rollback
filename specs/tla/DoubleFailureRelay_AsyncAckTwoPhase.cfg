SPECIFICATION Spec

\* DEMONSTRATION CONFIG (NOT the default; not registered in verify-tla.sh) — the THIRD and
\* strongest machine-checked NEGATIVE result in the S47 async ladder: even an ACTIVE
\* two-phase epoch COMMITMENT does not, on its own, close the residual once per-observer
\* death and in-flight acks are modeled.
\*
\* FIX_MODE = "AsyncAckTwoPhase" models the in-flight ack round + per-observer async death
\* + a two-phase revoke-before-lower commitment: the lowering peer ANNOUNCES (bumps +
\* gossips its drop-epoch, publishes its pending-low floor) and HOLDS the actual freeze
\* (LowerSafe) until every folding observer has heard the bump (its stale-high ack thereby
\* goes stale and it HOLDS on the freshness gate).
\*
\* It is STILL UNSOUND. TLC reports a safety invariant VIOLATED via the DEPARTED-LOW race
\* that per-observer death exposes: the low-receipt origin survivor dies and is pruned from
\* the VICTIM's fold while the RELAY survivor still folds it and adopts its low — but the
\* relay reports its own not-yet-pessimistic floor, and the victim, having forgotten the
\* origin's low, advances+discards above the eventual freeze before the relay's low reaches
\* it. (An earlier variant additionally fell to a LINK-HEAL race: a peer that committed its
\* freeze while partitioned from the victim was raced when the partition healed — a
\* partition-hold is unsound because partitions heal.) This is the InheritedFloor
\* "don't-forget-the-departed-low" obstruction (S44), now reproduced STRUCTURALLY: under
\* MeshAgree's SYNCHRONIZED-death idealization the origin is pruned from every fold at once,
\* so no relay adopts its low while a victim has lost it — which is why the idealized
\* MeshAgree PASSES and this faithful async model does not.
\*
\* CONCLUSION (machine-backed): the S46 passively-gossiped drop-epoch is NECESSARY but NOT
\* SUFFICIENT for the player-side relay fix; a fully sound implementable mechanism must
\* additionally (i) have the relay report its PESSIMISTIC queue-min (surface a folded low
\* immediately, not its committed freeze), (ii) use a FRESH ack postdating the observer's
\* intent (no reuse of a stale ack), and (iii) NOT rely on a partition-hold. Pinning that
\* combined mechanism is the precisely-scoped follow-up; the MeshAgree POLICY positive
\* (DoubleFailureRelay.cfg) still stands as the idealized sound aggregation rule.
\*
\* Expected result: TLC reports a safety invariant violated (NoConfirmedDivergence or its
\* single-survivor sharpening LockedRecordMatchesFreeze). Run manually:
\*   java -XX:+UseParallelGC -Xmx4g -jar .tla-tools/tla2tools.jar -workers auto -deadlock \
\*        -config specs/tla/DoubleFailureRelay_AsyncAckTwoPhase.cfg \
\*        specs/tla/DoubleFailureRelay.tla
\* Do NOT add this config to verify-tla.sh; it is meant to FAIL (on a safety invariant).
CONSTANT SURVIVORS = {a, b, c}
CONSTANT MAX_FRAME = 3
CONSTANT NULL_FRAME = 999
CONSTANT WINDOW = 1
CONSTANT RECEIPTS = {0, 3}
CONSTANT EPOCH_MAX = 2
CONSTANT FIX_MODE = "AsyncAckTwoPhase"

INVARIANT TypeInvariant
INVARIANT NoConfirmedDivergence
INVARIANT LockedRecordMatchesFreeze
INVARIANT FreezeNeverBelowGlobalMin
INVARIANT RecordedSourceInRange

\* S49: warm-cache convention (the established DoubleFailureRelay scope) — unchanged.
CONSTANT COLD_CACHE = FALSE
CONSTANT REORDER = FALSE
