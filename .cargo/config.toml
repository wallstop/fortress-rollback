# Cargo build configuration for faster compilation
# See: https://doc.rust-lang.org/cargo/reference/config.html

[target.x86_64-unknown-linux-gnu]
# Use lld linker for faster linking (installed in devcontainer)
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

[target.aarch64-unknown-linux-gnu]
# ARM64 configuration using clang+lld for faster linking (local development)
# For CI cross-compilation, Cross.toml passes through environment variables that
# allow the CI workflow to override these settings to use GCC instead
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

[build]
# Use all available CPU cores for parallel compilation
# Adjust if you want to leave cores free for other work
# jobs = 24

# Note: sccache is configured via RUSTC_WRAPPER environment variable
# instead of here, so it's automatically used when available.
# The devcontainer sets this up in .bashrc when sccache is installed.

[profile.dev]
# Split debug info for faster incremental linking
split-debuginfo = "unpacked"

# Note: [profile.dev.package."*"] with opt-level=1 is defined in Cargo.toml
# to optimize dependencies while keeping local code unoptimized for faster builds

[http]
# CI has seen crates.io HTTP/2 framing flakes during dependency resolution.
# This is intentionally repo-wide rather than semver-only: every cargo-heavy CI
# job shares the same registry transport, and local builds still prefer a
# slightly less aggressive fetch path over failing on transient network behavior.
multiplexing = false

[net]
# Cargo's default is 3. CI dependency resolution is usually cached, so extra
# retries mainly help cold-cache or semver-checks runs survive brief registry
# hiccups without affecting normal build time.
retry = 10

[alias]
# Convenient aliases for common operations
# All test aliases use --no-capture so output is visible on failures
t = "nextest run --no-capture"
qt = "nextest run --no-fail-fast --no-capture"
ci = "nextest run --profile ci --no-capture"
c = "clippy --workspace --all-targets --features tokio,json"
b = "build --workspace --all-targets"
