# Nextest configuration for fortress-rollback
# See: https://nexte.st/book/configuration.html
#
# ZERO TOLERANCE FOR FLAKY TESTS
# All tests must pass on first attempt. If a test fails intermittently,
# it's either a production bug or a test bug that must be fixed.
# Do NOT add retries to mask flakiness.

[profile.default]
# Zero retries - tests must pass first time
retries = 0

# Use all available threads for test execution
test-threads = "num-cpus"

# Fail fast by default (stop on first failure)
fail-fast = true

# Show slow tests (helps identify performance issues)
slow-timeout = { period = "30s", terminate-after = 2 }

# Status output during test runs
status-level = "pass"

# CRITICAL: Always capture and display test output for debugging
# This ensures failure output is visible without re-running tests
failure-output = "immediate-final" # Show failure output immediately AND at end
success-output = "never"           # Hide output for passing tests (reduce noise)

# Multi-process UDP tests use fixed ports and real child processes. Run them
# one at a time so fixed port ranges cannot collide across nextest workers.
[test-groups.network-multi-process]
max-threads = 1

# Multi-process network tests spawn external peer processes and exercise real
# UDP loopback. The extreme/flaky chaos scenarios AND the long-running endurance
# / high-latency sessions are `#[ignore]`d and only run in the nightly network
# suite (.github/workflows/ci-network-nightly.yml) under the dedicated
# `ci-network-nightly` profile below. The remaining per-PR `multi_process` tests
# are short smoke tests (~100 frames; they normally finish in seconds) but each
# carries an internal peer-level timeout of up to 120s as a safety net, and the
# harness adds ~30s on top before giving up with diagnostics. The per-test
# budget below (period 60s, terminate-after 3 = 180s) therefore sits just ABOVE
# that ~150s harness ceiling, so a genuinely hung peer is reported by the
# harness (with full diagnostics) rather than being SIGKILLed early by nextest,
# while a wedged test still cannot block PR CI for the old 12 minutes.
[[profile.default.overrides]]
filter = 'test(network::multi_process::)'
test-group = "network-multi-process"
slow-timeout = { period = "60s", terminate-after = 3 } # 180s: just above the ~150s harness ceiling

[profile.default.junit]
# Generate JUnit XML reports for CI integration
path = "target/nextest/default/junit.xml"

# CI profile - same zero-tolerance policy. Used for per-PR CI (ci-network.yml).
[profile.ci]
retries = 0
fail-fast = false                                      # Run all tests to see full failure picture
slow-timeout = { period = "60s", terminate-after = 3 }

# Per-PR multi_process budget mirrors the default profile (see the comment
# above): 180s, just above the ~150s harness ceiling of the kept smoke tests.
[[profile.ci.overrides]]
filter = 'test(network::multi_process::)'
test-group = "network-multi-process"
slow-timeout = { period = "60s", terminate-after = 3 } # 180s: just above the ~150s harness ceiling

# Nightly network profile - used ONLY by ci-network-nightly.yml via
# `--profile ci-network-nightly --run-ignored ignored-only`. The ignored tests
# are the extreme-chaos scenarios (peer timeouts up to 240s) and the long
# endurance sessions (peer timeouts up to 600s for the 5000-frame stress test).
# Their nextest budget MUST exceed those internal timeouts + harness overhead,
# otherwise nextest would SIGKILL them before their own timeout fires and the
# nightly suite would always fail. 720s (period 60s, terminate-after 12) covers
# the 600s + ~30s harness ceiling of the largest endurance test. Settings not
# listed here fall back to [profile.default] (retries = 0, etc.).
[profile.ci-network-nightly]
retries = 0
fail-fast = false
slow-timeout = { period = "60s", terminate-after = 3 }

[[profile.ci-network-nightly.overrides]]
filter = 'test(network::multi_process::)'
test-group = "network-multi-process"
slow-timeout = { period = "60s", terminate-after = 12 } # 720s: covers the 600s endurance + harness ceiling

[profile.ci-network-nightly.junit]
path = "target/nextest/ci-network-nightly/junit.xml"
