# Nextest configuration for fortress-rollback
# See: https://nexte.st/book/configuration.html
#
# ZERO TOLERANCE FOR FLAKY TESTS
# All tests must pass on first attempt. If a test fails intermittently,
# it's either a production bug or a test bug that must be fixed.
# Do NOT add retries to mask flakiness.

[profile.default]
# Zero retries - tests must pass first time
retries = 0

# Use all available threads for test execution
test-threads = "num-cpus"

# Fail fast by default (stop on first failure)
fail-fast = true

# Show slow tests (helps identify performance issues)
slow-timeout = { period = "30s", terminate-after = 2 }

# Status output during test runs
status-level = "pass"

# CRITICAL: Always capture and display test output for debugging
# This ensures failure output is visible without re-running tests
failure-output = "immediate-final" # Show failure output immediately AND at end
success-output = "never"           # Hide output for passing tests (reduce noise)

# Multi-process UDP tests use fixed ports and real child processes. Run them
# one at a time so fixed port ranges cannot collide across nextest workers.
[test-groups.network-multi-process]
max-threads = 1

# Multi-process network tests spawn external peer processes and exercise real
# UDP loopback. The extreme/flaky chaos scenarios AND the long-running endurance
# / high-latency sessions are `#[ignore]`d and only run in the nightly network
# suite (.github/workflows/ci-network-nightly.yml) under the dedicated
# `ci-network-nightly` profile below.
#
# The per-PR `multi_process` tests are NON-ADVERSARIAL real-UDP smoke tests:
# the `spawn_peer` smoke-tier guard rejects any scenario that injects
# packet loss (the dominant driver of real-time CI starvation), so every per-PR
# scenario makes guaranteed forward progress and finishes in a few seconds even
# on a loaded runner. Determinism / progress-under-loss for the lossy scenarios
# is proven deterministically (virtual time) in tests/network/in_process_chaos.rs.
#
# The per-test budget below (period 60s, terminate-after 3 = 180s) is a
# safety ceiling over the harness source of truth in tests/network/multi_process.rs:
# PER_PR_MAX_PEER_TIMEOUT_SECS=90, macOS scale=1.5, and
# PROCESS_TIMEOUT_OVERHEAD_SECS=30 => 165s. A genuinely hung smoke peer is
# therefore reported by the harness (with diagnostics) rather than being
# SIGKILLed early by nextest. scripts/hooks/check-network-timing-invariants.py
# enforces this relationship and rejects direct wait_for_peer() bypasses.
[[profile.default.overrides]]
filter = 'test(network::multi_process::)'
test-group = "network-multi-process"
slow-timeout = { period = "60s", terminate-after = 3 } # 180s: above the 165s macOS-scaled harness ceiling

[profile.default.junit]
# Generate JUnit XML reports for CI integration
path = "target/nextest/default/junit.xml"

# CI profile - same zero-tolerance policy. Used for per-PR CI (ci-network.yml).
[profile.ci]
retries = 0
fail-fast = false                                      # Run all tests to see full failure picture
slow-timeout = { period = "60s", terminate-after = 3 }

# Per-PR multi_process budget mirrors the default profile (see the comment
# above): 180s, above the 165s worst-case macOS-scaled harness ceiling.
[[profile.ci.overrides]]
filter = 'test(network::multi_process::)'
test-group = "network-multi-process"
slow-timeout = { period = "60s", terminate-after = 3 } # 180s: above the 165s macOS-scaled harness ceiling

# Nightly network profile - used ONLY by ci-network-nightly.yml via
# `--profile ci-network-nightly --run-ignored ignored-only`. The ignored tests
# are the extreme-chaos scenarios (peer timeouts up to 240s), the long
# endurance sessions (peer timeouts up to 600s for the 5000-frame stress test),
# and the 4,000,000-frame deterministic soak selected by ci-network-nightly.yml.
# Their nextest budget MUST exceed those internal timeouts + harness overhead
# on every matrix OS, otherwise nextest would SIGKILL them before their own
# timeout fires. 960s (period 60s, terminate-after 16) covers the macOS-scaled
# ceiling of the largest endurance test: 600s * 1.5 + 30s = 930s. Settings not
# listed here fall back to [profile.default] (retries = 0, etc.).
[profile.ci-network-nightly]
retries = 0
fail-fast = false
slow-timeout = { period = "60s", terminate-after = 3 }

[[profile.ci-network-nightly.overrides]]
filter = 'test(network::multi_process::)'
test-group = "network-multi-process"
slow-timeout = { period = "60s", terminate-after = 16 } # 960s: covers the 930s macOS-scaled endurance ceiling

# The deterministic 4,000,000-frame soak measured 203.47s locally in release
# mode. A 600s ceiling leaves shared-runner/OS headroom while remaining far
# below the 240-minute workflow bound.
[[profile.ci-network-nightly.overrides]]
filter = 'test(network::soak::four_million_frame_soak_preserves_bounds_replay_and_lifecycle)'
slow-timeout = { period = "60s", terminate-after = 10 }

[profile.ci-network-nightly.junit]
path = "target/nextest/ci-network-nightly/junit.xml"

# Nightly deterministic-simulation profile. Each ignored shard runs 125
# release-mode, 5,000-step schedules. The generous per-test ceiling separates a
# genuinely slow shard from the workflow's absolute job timeout.
[profile.ci-simulation-nightly]
retries = 0
fail-fast = false
slow-timeout = { period = "120s", terminate-after = 8 }

[profile.ci-simulation-nightly.junit]
path = "target/nextest/ci-simulation-nightly/junit.xml"
